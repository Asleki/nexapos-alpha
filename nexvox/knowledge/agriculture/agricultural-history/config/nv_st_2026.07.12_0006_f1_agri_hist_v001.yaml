evidence_taxonomy:

  - evidence_id: AHF-EVD-001
    name: Archaeobotanical Evidence
    description: >
      Preserved seeds, fruits, wood, fibres, phytoliths, pollen, starch, and
      other plant traces used to reconstruct plant use and cultivation.

  - evidence_id: AHF-EVD-002
    name: Zooarchaeological Evidence
    description: >
      Animal bones, teeth, shells, age profiles, injury patterns, and other
      remains used to reconstruct hunting, management, and domestication.

  - evidence_id: AHF-EVD-003
    name: Settlement Evidence
    description: >
      Housing, activity areas, storage, pathways, boundaries, waste, and spatial
      organization used to study sedentism and village development.

  - evidence_id: AHF-EVD-004
    name: Tool Evidence
    description: >
      Tools, wear patterns, residues, breakage, and manufacturing evidence used
      to infer acquisition, cultivation, processing, and storage.

  - evidence_id: AHF-EVD-005
    name: Palaeoclimatic Evidence
    description: >
      Sediments, ice, pollen, charcoal, water records, and other indicators used
      to reconstruct past climatic and ecological conditions.

  - evidence_id: AHF-EVD-006
    name: Genetic Evidence
    description: >
      Genetic variation used to study domestication, population movement,
      selection, and relationships among managed and wild populations.

  - evidence_id: AHF-EVD-007
    name: Bioarchaeological Evidence
    description: >
      Human remains used to examine diet, disease, labour stress, mobility,
      mortality, and demographic change.

misconceptions:

  - misconception_id: AHF-MIS-001
    claim: Agriculture was invented once.
    correction: >
      Agriculture emerged through multiple independent and interacting pathways.

  - misconception_id: AHF-MIS-002
    claim: Hunter-gatherers had little environmental knowledge.
    correction: >
      Hunter-gatherer societies often possessed highly detailed ecological,
      seasonal, technological, and social knowledge.

  - misconception_id: AHF-MIS-003
    claim: Permanent settlement began only after farming.
    correction: >
      Some communities became semi-sedentary or sedentary before depending
      heavily on cultivated food.

  - misconception_id: AHF-MIS-004
    claim: Domestication and cultivation mean the same thing.
    correction: >
      Cultivation is management of growth, while domestication involves
      inherited biological or behavioural change over generations.

  - misconception_id: AHF-MIS-005
    claim: Agriculture immediately improved human health.
    correction: >
      Early agricultural dependence could increase calories while reducing
      dietary diversity and increasing disease exposure.

  - misconception_id: AHF-MIS-006
    claim: Agricultural development was an irreversible progression.
    correction: >
      Communities could adopt, reduce, combine, or abandon cultivation depending
      on environment, risk, labour, and social conditions.

