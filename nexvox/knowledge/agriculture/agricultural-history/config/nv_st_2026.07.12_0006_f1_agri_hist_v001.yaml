reasoning_rules:
  - id: AHF-RULE-001
    rule: >
      Agriculture must be treated as a gradual and regionally variable
      transition rather than one sudden invention.
  - id: AHF-RULE-002
    rule: >
      Food gathering, environmental management, cultivation, domestication,
      storage, and sedentism may overlap rather than occur in one fixed order.
  - id: AHF-RULE-003
    rule: >
      Similar historical outcomes may emerge from different environmental,
      demographic, social, and cultural conditions.
  - id: AHF-RULE-004
    rule: >
      Increased food production must not automatically be interpreted as
      improved health, equality, freedom, or ecological sustainability.
  - id: AHF-RULE-005
    rule: >
      Archaeological absence must not automatically be interpreted as proof
      that a practice, institution, or form of knowledge did not exist.
  - id: AHF-RULE-006
    rule: >
      Hunter-gatherer societies must not be represented as ignorant,
      disorganized, primitive, or environmentally passive.
  - id: AHF-RULE-007
    rule: >
      Domestication must be distinguished from cultivation, management,
      taming, protection, and harvesting.
  - id: AHF-RULE-008
    rule: >
      Climate change may create pressures and opportunities, but it does not
      independently explain the emergence of agriculture.
  - id: AHF-RULE-009
    rule: >
      Population growth may be a cause, consequence, or feedback effect of
      agricultural development depending on context.
  - id: AHF-RULE-010
    rule: >
      Every explanation should consider environment, knowledge, labour,
      social organization, risk, and long-term feedback.

