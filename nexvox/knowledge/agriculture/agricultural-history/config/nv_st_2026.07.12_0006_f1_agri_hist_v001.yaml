scope:
  purpose: >
    Introduce the historical transition from food gathering to agriculture
    through environmental, biological, social, cultural, technological,
    economic, archaeological, and systems perspectives.
  included_topics:
    - agricultural evolution overview
    - reasons agriculture emerged
    - human evolution and food
    - climate transitions
    - hunter-gatherer systems
    - sedentism
    - domestication concepts
    - early villages
    - early food systems
    - knowledge transmission
    - evolution frameworks
  excluded_topics:
    - detailed country histories
    - named historical rulers
    - deep commodity histories
    - modern agricultural policy
    - detailed modern farming systems
    - industrial agriculture
    - digital agriculture

