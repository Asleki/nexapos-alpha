risks:
- id: RISK-001
  name: Route insecurity
  description: Trade and supply decline when conflict, raiding, or state fragmentation make movement unsafe.
  categories:
  - political
  - economic
  - social
  - environmental
  - institutional
- id: RISK-002
  name: Overtaxation
  description: Households lose seed, reserves, and recovery capacity.
  categories:
  - political
  - economic
  - social
  - environmental
  - institutional
- id: RISK-003
  name: Storage capture
  description: Elites or armies monopolize reserves.
  categories:
  - political
  - economic
  - social
  - environmental
  - institutional
- id: RISK-004
  name: Forced migration
  description: Communities lose land, institutions, and continuity.
  categories:
  - political
  - economic
  - social
  - environmental
  - institutional
- id: RISK-005
  name: Land concentration
  description: Small producers lose secure access.
  categories:
  - political
  - economic
  - social
  - environmental
  - institutional
- id: RISK-006
  name: Administrative collapse
  description: Records, roads, storage, and tax systems fail.
  categories:
  - political
  - economic
  - social
  - environmental
  - institutional
- id: RISK-007
  name: Market dependency
  description: Regions become vulnerable to route or price disruption.
  categories:
  - political
  - economic
  - social
  - environmental
  - institutional
- id: RISK-008
  name: Ecological mismatch
  description: Transferred institutions or settlement models fail in new environments.
  categories:
  - political
  - economic
  - social
  - environmental
  - institutional
- id: RISK-009
  name: Labor coercion
  description: Production rises through violence while household welfare and legitimacy decline.
  categories:
  - political
  - economic
  - social
  - environmental
  - institutional
- id: RISK-010
  name: War destruction
  description: Fields, animals, stores, and water systems are destroyed.
  categories:
  - political
  - economic
  - social
  - environmental
  - institutional
- id: RISK-011
  name: Knowledge loss
  description: Language, migration, death, or suppression break transmission.
  categories:
  - political
  - economic
  - social
  - environmental
  - institutional
- id: RISK-012
  name: Urban food crisis
  description: Cities face shortage when rural supply or transport fails.
  categories:
  - political
  - economic
  - social
  - environmental
  - institutional
- id: RISK-013
  name: Religious conflict
  description: Institutional land and labor systems become contested.
  categories:
  - political
  - economic
  - social
  - environmental
  - institutional
- id: RISK-014
  name: Trade monopoly
  description: A small group controls routes, prices, and access.
  categories:
  - political
  - economic
  - social
  - environmental
  - institutional
- id: RISK-015
  name: Colonial extraction
  description: External demand undermines local food security and autonomy.
  categories:
  - political
  - economic
  - social
  - environmental
  - institutional
exceptions:
- id: EXC-001
  description: Some large states remained weakly integrated outside political centers.
  purpose: prevent_overgeneralization
- id: EXC-002
  description: Some trade networks operated without strong centralized states.
  purpose: prevent_overgeneralization
- id: EXC-003
  description: Some mobile peoples controlled major trade corridors.
  purpose: prevent_overgeneralization
- id: EXC-004
  description: Some communal land systems survived within kingdoms and empires.
  purpose: prevent_overgeneralization
- id: EXC-005
  description: Some cities relied heavily on nearby rather than distant food supply.
  purpose: prevent_overgeneralization
- id: EXC-006
  description: Some religious institutions protected local producers rather than extracting from them.
  purpose: prevent_overgeneralization
- id: EXC-007
  description: Some conquered peoples preserved substantial local autonomy.
  purpose: prevent_overgeneralization
- id: EXC-008
  description: Some colonial systems depended more on taxation than direct land seizure.
  purpose: prevent_overgeneralization
- id: EXC-009
  description: Some regions remained relatively isolated despite nearby trade routes.
  purpose: prevent_overgeneralization
- id: EXC-010
  description: Some merchant networks crossed political borders more effectively than states did.
  purpose: prevent_overgeneralization
evidence_types:
- id: EVD-001
  name: Administrative records
  description: Tax lists, land records, tribute accounts, storage records, and official correspondence.
  limitations:
  - preservation_bias
  - elite_bias
  - dating_uncertainty
  - interpretive_uncertainty
- id: EVD-002
  name: Travel accounts
  description: Descriptions by merchants, pilgrims, envoys, and visitors, interpreted cautiously.
  limitations:
  - preservation_bias
  - elite_bias
  - dating_uncertainty
  - interpretive_uncertainty
- id: EVD-003
  name: Archaeological settlement evidence
  description: Cities, villages, roads, ports, storage, fields, and fortifications.
  limitations:
  - preservation_bias
  - elite_bias
  - dating_uncertainty
  - interpretive_uncertainty
- id: EVD-004
  name: Material culture
  description: Tools, containers, transport equipment, seals, weights, and market infrastructure.
  limitations:
  - preservation_bias
  - elite_bias
  - dating_uncertainty
  - interpretive_uncertainty
- id: EVD-005
  name: Environmental evidence
  description: Sediments, pollen, charcoal, soils, and water systems.
  limitations:
  - preservation_bias
  - elite_bias
  - dating_uncertainty
  - interpretive_uncertainty
- id: EVD-006
  name: Oral traditions
  description: Political memory, migration stories, land claims, and customary institutions.
  limitations:
  - preservation_bias
  - elite_bias
  - dating_uncertainty
  - interpretive_uncertainty
- id: EVD-007
  name: Linguistic evidence
  description: Borrowed terms, trade vocabulary, political titles, and language movement.
  limitations:
  - preservation_bias
  - elite_bias
  - dating_uncertainty
  - interpretive_uncertainty
- id: EVD-008
  name: Bioarchaeological evidence
  description: Diet, mobility, health, labor stress, and migration.
  limitations:
  - preservation_bias
  - elite_bias
  - dating_uncertainty
  - interpretive_uncertainty
- id: EVD-009
  name: Numismatic evidence
  description: Coins and monetary circulation indicating trade and political control.
  limitations:
  - preservation_bias
  - elite_bias
  - dating_uncertainty
  - interpretive_uncertainty
- id: EVD-010
  name: Maritime evidence
  description: Shipwrecks, ports, navigation tools, and coastal settlement.
  limitations:
  - preservation_bias
  - elite_bias
  - dating_uncertainty
  - interpretive_uncertainty
