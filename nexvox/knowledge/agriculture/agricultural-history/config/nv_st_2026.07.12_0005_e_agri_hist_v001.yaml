training:
  level: NexVox Studio L2
  retrieval_enabled: true
  embedding_enabled: true
  knowledge_graph_enabled: true
  fine_tuning_enabled: false
  chunking:
    primary_unit: section
    secondary_unit: subsection
    recommended_tokens: 700
    maximum_tokens: 1200
    overlap_tokens: 120
  reasoning_rules:
  - distinguish continent from internal region
  - distinguish polity from modern nation-state
  - distinguish voluntary from forced movement
  - compare state and household interests
  - avoid treating empire as automatic progress
  - connect trade, migration, land, labor, religion, and environment
  - state evidence limits
quality:
  minimum_markdown_lines: 2000
  minimum_yaml_lines: 2000
  placeholders_allowed: false
  substantive_content_required: true
  companion_sync_required: true
  named_crops_excluded: true
  technical_methods_excluded: true
  modern_policy_excluded: true
version_history:
- version: v001
  date: '2026-07-12'
  summary: Initial creation of Volume E with named continents, historical regions, peoples, polities,
    governments, trade systems, and intercontinental links.
