  - concept_id: AHF-013.02
    parent_section_id: AHF-013
    title: Hunter-Gatherer Food Systems
    markdown_heading: "### AHF-013.02 Hunter-Gatherer Food Systems"
    companion_markdown: nv_st_2026.07.12_0006_f1_agri_hist_v001.md
    mapping_status: fully_mapped
    canonical_term: hunter_gatherer_food_systems

    definition: >
      Hunter-gatherer food systems are integrated ecological, technological,
      social and knowledge-based systems through which human communities
      obtained food from naturally occurring resources before agriculture
      became the dominant mode of production. These systems combined hunting,
      gathering, fishing, trapping, scavenging, food processing, preservation,
      storage, seasonal mobility and exchange into flexible strategies capable
      of adapting to changing environments.

    overview:
      description: >
        Hunter-gatherer societies did not survive through random food
        collection. Their food systems required detailed ecological knowledge,
        careful planning, seasonal forecasting, cooperation and technological
        innovation. Communities continuously adjusted labour, movement,
        harvesting methods and food choices according to rainfall, animal
        migration, plant growth, water availability and environmental risk.

    major_subsistence_components:

      hunting:
        description: >
          Hunting supplied meat, fat, marrow, hides, bones, tendons, horns and
          tools. Hunting strategies differed according to landscape, prey
          behaviour and available technology.
        methods:
          - persistence hunting
          - ambush hunting
          - communal drives
          - trapping
          - spear hunting
          - bow hunting
          - net hunting
          - pit traps

      gathering:
        description: >
          Gathering often contributed a substantial proportion of daily food.
          Communities collected edible plants throughout the year according to
          seasonal availability.
        common_resources:
          - fruits
          - berries
          - roots
          - tubers
          - bulbs
          - nuts
          - seeds
          - wild cereals
          - wild legumes
          - mushrooms
          - edible leaves
          - medicinal plants

      fishing:
        description: >
          Rivers, lakes, wetlands and coastal waters supplied reliable protein
          and often reduced dependence on large-game hunting.
        techniques:
          - hand collection
          - fish traps
          - nets
          - hooks
          - harpoons
          - baskets
          - tidal trapping
          - canoes

      insect_collection:
        description: >
          Insects provided highly nutritious protein and fat and were harvested
          seasonally across many environments.
        examples:
          - termites
          - locusts
          - grasshoppers
          - beetle larvae
          - caterpillars
          - ants
          - bees

      shellfish_collection:
        description: >
          Coastal and riverine communities harvested shellfish that could often
          be collected predictably with relatively low energy expenditure.
        examples:
          - oysters
          - mussels
          - clams
          - limpets
          - freshwater mussels
          - snails

      scavenging:
        description: >
          Early humans sometimes obtained edible tissues, marrow and fat from
          carcasses abandoned by predators or animals that died naturally.

    ecological_zones:

      tropical_forests:
        principal_foods:
          - fruits
          - nuts
          - roots
          - tubers
          - fish
          - insects
          - monkeys
          - forest antelope

      savannas:
        principal_foods:
          - grazing mammals
          - edible grasses
          - roots
          - tubers
          - berries
          - insects

      wetlands:
        principal_foods:
          - fish
          - birds
          - eggs
          - reeds
          - aquatic plants
          - molluscs

      deserts:
        principal_foods:
          - drought-resistant plants
          - reptiles
          - rodents
          - insects
          - oasis resources

      mountains:
        principal_foods:
          - mountain sheep
          - goats
          - alpine plants
          - berries
          - medicinal herbs

      coastal_regions:
        principal_foods:
          - fish
          - shellfish
          - crustaceans
          - marine mammals
          - seabirds
          - seaweed

    labour_organization:

      common_roles:
        - hunters
        - gatherers
        - fishers
        - trackers
        - tool makers
        - food processors
        - fire keepers
        - knowledge holders

      characteristics:
        - flexible task allocation
