    misconceptions:

      - misconception: Early humans ate one universal diet.
        correction: >
          Diets differed greatly across environments, seasons, technologies,
          biological populations, and cultural traditions.

      - misconception: Early diets were based almost entirely on meat.
        correction: >
          Many communities consumed broad combinations of plant, animal,
          aquatic, insect, fungal, and preserved foods.

      - misconception: Food gathering required little knowledge.
        correction: >
          Safe and reliable gathering required detailed botanical, ecological,
          climatic, geographical, and processing knowledge.

      - misconception: Agriculture immediately replaced early food systems.
        correction: >
          Gathering, hunting, fishing, cultivation, herding, and trade often
          coexisted for long periods.

      - misconception: Sedentary communities were necessarily agricultural.
        correction: >
          Some communities established long-term settlements using reliable
          wild resources before becoming dependent on farming.

