          - wild sheep
          - wild goats
          - wild barley
          - wild einkorn
        archaeological_importance: >
          Seasonal grasslands bordering woodland environments created ideal
          conditions for repeated harvesting of wild cereals and observation
          of herd behaviour before domestication.

      Europe:
        principal_regions:
          - Pontic Steppe
          - Hungarian Plain
          - Danube Basin
          - Ukrainian grasslands
        present_countries:
          - Ukraine
