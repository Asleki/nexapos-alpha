    title: African Origins of Human Diet
    markdown_heading: "### AHF-013.01 African Origins of Human Diet"
    companion_markdown: nv_st_2026.07.12_0006_f1_agri_hist_v001.md
    mapping_status: fully_mapped
    canonical_term: african_origins_of_human_diet

    definition: >
      Africa preserves the oldest and most continuous evidence for human dietary
      evolution. The continent contains the earliest known archaeological,
      palaeoanthropological, palaeoenvironmental, and genetic evidence showing
      how changing climates, landscapes, plants, animals, rivers, lakes and
      coastlines shaped human food acquisition long before agriculture emerged.

    historical_context:
      continent: Africa
      significance: >
        Modern humans (Homo sapiens) originated in Africa, and earlier hominin
        species also evolved there. Consequently, Africa contains the longest
        documented sequence of dietary adaptation, extending over millions of
        years.
      approximate_time_range:
        earliest_hominins: "about 7 million years ago"
        genus_homo: "about 2.8 million years ago"
        homo_sapiens: "about 300,000 years ago"
        agriculture_in_northeast_africa: "after approximately 10,000 years ago"

    major_geographical_regions:

