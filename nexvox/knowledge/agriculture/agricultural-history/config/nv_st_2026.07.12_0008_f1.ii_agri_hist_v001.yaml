      statement: >
        Grassland environments preserve archaeological materials unevenly.
        Reconstructions combine faunal remains, plant microfossils,
        sedimentary records, palaeoclimate evidence and ethnographic
        comparisons while recognizing regional variation.

  - concept_id: AHF-013.10
    parent_section_id: AHF-013
    title: Seasonal Food Availability
    markdown_heading: "### AHF-013.10 Seasonal Food Availability"
    companion_markdown: nv_st_2026.07.12_0006_f1_agri_hist_v001.md
    mapping_status: fully_mapped
    canonical_term: seasonal_food_availability

    definition: >
      Seasonal food availability refers to the predictable changes in the
      abundance, diversity and accessibility of food resources throughout the
      annual cycle. Early human communities organized movement, labour,
      technology, storage and social cooperation around these recurring
      seasonal patterns.

    extended_definition: >
      Before agriculture, food resources were rarely available in equal
      quantities throughout the year. Rainfall, temperature, daylight,
      flooding, drought, flowering, fruiting, migration, breeding and water
      availability created annual cycles that determined when specific foods
      could be collected, hunted, fished or preserved. Understanding these
      cycles became one of humanity's earliest scientific knowledge systems.

    seasonal_drivers:

      climate:
        factors:
          - rainfall
          - drought
          - snowfall
          - temperature
          - humidity
          - frost
          - wind

      vegetation:
        factors:
          - flowering
          - fruiting
          - seed production
          - leaf emergence
          - grass maturation
          - root development

      animals:
        factors:
          - migration
          - breeding
          - calving
          - nesting
          - spawning
          - hibernation

      hydrology:
        factors:
          - river flooding
          - lake expansion
          - wetland formation
          - spring emergence
          - seasonal streams

    continental_examples:

      Africa:
        dominant_patterns:
          - wet season gathering
          - dry season hunting
          - floodplain fishing
          - savanna migrations
        principal_foods:
          - wild fruits
          - roots
          - fish
          - antelope
          - insects
          - edible grasses

      Southwest_Asia:
        dominant_patterns:
          - spring cereal harvesting
          - summer fruit gathering
          - autumn nut collection
          - winter hunting
        principal_foods:
          - wild barley
          - einkorn
          - pistachios
