    decision_rules:

      - rule_id: AHF-013.08-RULE-001
        condition: >
          IF fruiting trees are dispersed and ripening at different times
        response: >
          divide labour, maintain route knowledge and move between known tree
          clusters.

      - rule_id: AHF-013.08-RULE-002
        condition: >
          IF nuts or seeds contain bitter or toxic compounds
        response: >
          apply roasting, soaking, leaching, grinding or fermentation before
          consumption.

      - rule_id: AHF-013.08-RULE-003
        condition: >
          IF rainfall increases river levels
        response: >
          shift labour toward fishing, flooded-forest resources and aquatic
          plants while avoiding unsafe crossings.

      - rule_id: AHF-013.08-RULE-004
        condition: >
          IF one forest zone experiences poor fruiting
        response: >
          move toward another elevation, river basin, woodland edge or exchange
          network.

      - rule_id: AHF-013.08-RULE-005
        condition: >
          IF food spoils rapidly under humid conditions
        response: >
          consume quickly, smoke, dry near fire, ferment or exchange before
          deterioration.

      - rule_id: AHF-013.08-RULE-006
        condition: >
          IF repeated burning produces useful regrowth
        response: >
          maintain controlled disturbance while monitoring fire risk and forest
          recovery.

    metrics_and_proxies:

      fruiting_reliability:
        definition: >
          The consistency with which a tree or forest zone produces usable fruit
          during an expected season.

      nut_density:
        definition: >
          The concentration of edible nut-producing trees within a harvesting
          area.

      travel_cost:
        definition: >
          Time, energy and risk required to reach dispersed forest resources.

      canopy_access_cost:
        definition: >
          Labour and danger involved in climbing or retrieving food from tall
          trees.

      processing_cost:
        definition: >
          Labour, fuel, water and time needed to detoxify, grind or cook forest
          foods.

      spoilage_rate:
        definition: >
          The speed at which food deteriorates under warm and humid conditions.

      river_dependence:
        definition: >
          The degree to which a forest community relies upon rivers for food,
          water, transport and navigation.

      dietary_diversity:
        definition: >
          The number and balance of plant, animal, aquatic, fungal and insect
          resources within the food system.

    risks:

      ecological_risks:
        - failed fruiting season
        - flood
        - drought
        - wildfire
        - storm damage
        - river-course change
        - animal decline

      biological_risks:
        - toxic plants
        - poisonous fungi
        - venomous animals
        - disease vectors
        - parasites
        - contaminated water

      mobility_risks:
        - difficult terrain
        - low visibility
        - river crossing
        - falling trees
        - getting lost
        - injury during climbing

      storage_risks:
        - humidity
        - insects
        - rodents
        - fungal growth
        - rapid decomposition

      social_risks:
        - conflict over productive trees
        - territorial exclusion
        - knowledge loss
        - route disruption
        - unequal food access

    failure_modes:

      - failure_id: AHF-013.08-FM-001
        name: Fruiting Failure
        description: >
          Weather, disease, fire or ecological change causes major fruit and nut
          resources to produce poorly.

      - failure_id: AHF-013.08-FM-002
        name: Toxicity Error
        description: >
          A plant, fungus or seed is misidentified or processed incorrectly.

      - failure_id: AHF-013.08-FM-003
        name: River Access Failure
        description: >
          Flood, drought, territorial conflict or channel change prevents use of
          a major food and transport corridor.

      - failure_id: AHF-013.08-FM-004
        name: Preservation Failure
        description: >
          Humidity, insects or fungal growth destroys gathered food before use.

      - failure_id: AHF-013.08-FM-005
        name: Knowledge Fragmentation
        description: >
          Place names, routes, plant knowledge or processing methods are not
          transmitted successfully.

      - failure_id: AHF-013.08-FM-006
        name: Resource Overconcentration
        description: >
          Population pressure or restricted mobility causes excessive dependence
          on a limited forest zone.

    relationships:

      influenced_by:
        - rainfall
        - temperature
        - river behaviour
        - forest type
        - biodiversity
        - elevation
        - soil
        - fire
        - mobility
        - social organization

      influences:
        - settlement
        - storage
        - tool design
        - navigation
        - plant management
        - trade
        - domestication pathways
        - agricultural development

      overlaps_with:
        - hunter-gatherer food systems
        - riverine food systems
        - mountain diets
        - coastal diets
        - nomadic lifestyles
        - early villages

      contributes_to:
        - botanical classification
        - seasonal calendars
        - food detoxification
        - landscape management
        - plant protection
        - forest enrichment
        - later horticulture

    evidence_types:

      archaeobotanical:
        includes:
          - carbonized seeds
          - nutshell
          - fruit stones
          - pollen
          - phytoliths
          - starch residues
          - wood charcoal

      zooarchaeological:
        includes:
          - mammal bones
          - bird bones
          - fish bones
          - shell
          - cut marks
          - burning

      technological:
        includes:
          - grinding stones
          - digging tools
          - traps
          - baskets
          - fishing equipment
          - cutting blades

      palaeoenvironmental:
        includes:
          - lake cores
          - river sediments
          - pollen sequences
          - charcoal deposits
          - soil profiles

      ethnographic_and_oral:
        includes:
          - place names
          - plant terminology
          - seasonal knowledge
          - oral maps
          - processing traditions
        caution: >
          Recent or recorded practices may inform interpretation but must not be
          projected uncritically into deep prehistory.

    misconceptions:

      - misconception: Tropical forests always provided unlimited food.
        correction: >
          Forest resources could be highly seasonal, dispersed, toxic,
          difficult to access and quick to spoil.

      - misconception: Forest communities lacked specialised technology.
        correction: >
          Successful forest living required tools for navigation, digging,
          climbing, trapping, fishing, processing, detoxification and storage.

      - misconception: Forest landscapes were untouched by humans.
        correction: >
          Repeated burning, plant protection, harvesting and settlement could
          alter species composition and landscape structure.

      - misconception: Forest diets were based mainly on fruit.
        correction: >
          Forest food systems often combined roots, nuts, seeds, fungi, insects,
          fish, birds and terrestrial animals.

      - misconception: Dense forests prevented complex settlement.
        correction: >
          Reliable rivers, fisheries, nut resources and managed landscapes could
          support repeated or semi-permanent settlement.

