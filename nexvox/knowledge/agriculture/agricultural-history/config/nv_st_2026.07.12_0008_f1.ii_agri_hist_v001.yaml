    title: Definition of Early Human Diet
    markdown_heading: "### AHF-013.00 Definition of Early Human Diet"
    companion_markdown: nv_st_2026.07.12_0006_f1_agri_hist_v001.md
    mapping_status: fully_mapped
    canonical_term: early_human_diet

    definition: >
      Early human diet refers to the changing combinations of wild plant,
      animal, aquatic, fungal, insect, mineral, and seasonally available food
      resources consumed by human populations before agriculture became the
      dominant means of food production. It includes not only what people ate,
      but also how food was located, selected, acquired, transported,
      processed, shared, preserved, stored, exchanged, and understood.

    extended_definition: >
      Early human diets were not one fixed universal menu. They varied across
      continents, climatic zones, ecosystems, time periods, technologies,
      biological populations, cultural traditions, and seasonal conditions.
      A community living near a productive coastline could organize much of its
      food system around marine and estuarine resources, while a community in
      an inland grassland, tropical forest, mountain valley, desert margin, or
      river basin would rely on a different combination of resources and
      knowledge.

    historical_scope:
      begins_with:
        - early hominin food acquisition
        - scavenging
        - gathering
        - hunting
        - fishing
        - shellfish collection
        - insect consumption
        - plant processing
      continues_through:
        - organized seasonal foraging
        - food preservation
        - portable storage
        - semi-sedentary settlement
        - deliberate plant management
        - intensified wild cereal harvesting
        - intensified wild legume harvesting
      transition_boundary:
        - experimental cultivation
        - animal management
        - inherited domestication traits
        - permanent food-production systems
      boundary_note: >
        Early human diet does not end at one universal date. Hunting,
        gathering, fishing, cultivation, herding, and trade often overlapped
        for centuries or millennia.

    core_characteristics:
      - dietary flexibility
      - seasonal adaptation
      - geographical variation
      - ecological knowledge
      - resource diversification
      - mobility
      - food processing
      - preservation
      - sharing
      - risk management
