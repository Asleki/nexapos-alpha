    forest_food_workflow:

      - sequence: 1
        action: identify the forest zone and expected seasonal resources

      - sequence: 2
        action: inspect rainfall, flowering, fruiting, tracks and water levels

      - sequence: 3
        action: select safe routes and organise labour

      - sequence: 4
