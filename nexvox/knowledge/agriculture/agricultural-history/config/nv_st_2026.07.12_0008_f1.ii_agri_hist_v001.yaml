          - zebra
          - wildebeest
          - gazelle
          - ostrich
          - edible grasses
          - wild legumes
        archaeological_importance: >
          African savannas supported some of the earliest Homo populations and
          provided long-term environments for persistence hunting, scavenging,
          cooperative hunting and detailed animal behavioural observation.

      Southwest_Asia:
        principal_regions:
          - Syrian Steppe
          - Anatolian Plateau
          - Upper Mesopotamia
          - Zagros foothills
        present_countries:
          - Türkiye
