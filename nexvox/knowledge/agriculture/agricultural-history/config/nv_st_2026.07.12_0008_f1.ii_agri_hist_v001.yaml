    misconceptions:

      - misconception: Hunter-gatherers wandered randomly.
        correction: >
          Most communities followed well-established seasonal routes based on
          accumulated ecological knowledge.

      - misconception: Hunting provided all food.
        correction: >
          Plant foods, aquatic resources, insects and gathered materials often
          supplied a substantial proportion of total dietary intake.

      - misconception: Hunter-gatherer societies lacked technology.
        correction: >
          Their technologies were highly specialized for mobility, food
          acquisition, processing and environmental adaptation.

      - misconception: Agriculture immediately replaced hunter-gatherer food systems.
        correction: >
          Hunting, gathering and farming coexisted for long periods in many
          regions of the world.

    retrieval_tags:
