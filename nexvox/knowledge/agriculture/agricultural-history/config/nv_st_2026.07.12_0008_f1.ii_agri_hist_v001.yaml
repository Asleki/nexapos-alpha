    major_ecological_characteristics:

      visibility:
        description: >
          Open landscapes allowed people to observe animal movement over long
          distances and plan coordinated hunting.

      mobility:
        description: >
          Grasslands encouraged seasonal movement because grazing animals and
          edible plants shifted with rainfall and vegetation growth.

      fire:
        description: >
          Natural and human-managed fires maintained open vegetation, promoted
          new plant growth and influenced herbivore distribution.

      rainfall:
        description: >
          Seasonal rainfall determined pasture quality, animal migrations and
          availability of edible grasses.

      water:
        description: >
          Rivers, springs, wetlands and seasonal pools became focal points for
          both humans and wildlife.

    principal_food_categories:

