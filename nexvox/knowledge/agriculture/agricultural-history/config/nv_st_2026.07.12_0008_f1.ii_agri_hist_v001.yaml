          - Kazakhstan
        dominant_resources:
          - horse
          - aurochs
          - bison
          - deer
          - wild grasses
        archaeological_importance: >
          European grasslands became major migration corridors for both humans
          and animals following the Last Glacial Maximum.

      Asia:
        principal_regions:
          - Mongolian Steppe
          - Central Asian Steppe
          - Tibetan Plateau margins
          - Inner Mongolia
        present_countries:
          - Mongolia
          - China
          - Kazakhstan
          - Kyrgyzstan
          - Uzbekistan
        dominant_resources:
          - wild horses
          - gazelles
          - sheep
          - goats
          - steppe grasses
        archaeological_importance: >
          Vast open landscapes encouraged long-distance mobility and later
          became centers for pastoral development.

      North_America:
        principal_regions:
          - Great Plains
          - Canadian Prairies
          - Shortgrass Prairie
        dominant_resources:
