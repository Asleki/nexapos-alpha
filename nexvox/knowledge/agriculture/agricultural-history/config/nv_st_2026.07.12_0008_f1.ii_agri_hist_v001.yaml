  - concept_id: AHF-013.04
    parent_section_id: AHF-013
    title: Climate and Diet
    markdown_heading: "### AHF-013.04 Climate and Diet"
    companion_markdown: nv_st_2026.07.12_0006_f1_agri_hist_v001.md
    mapping_status: fully_mapped
    canonical_term: climate_and_diet

    definition: >
      Climate strongly influenced early human diets by determining the
      availability, distribution, productivity and seasonality of plants,
      animals and water resources. Long-term climatic shifts repeatedly altered
      ecosystems, forcing human populations to modify food strategies,
      technologies, mobility patterns and eventually approaches to food
      management that contributed to agricultural development.

    overview:
      description: >
        Climate did not simply determine what people could eat. Human
        populations continually adapted to changing environments through
        observation, innovation, cooperation and mobility. Dietary evolution
        therefore resulted from continuous interaction between climate,
        ecosystems and human decision-making.

    major_climatic_factors:

      temperature:
        influence:
          - controls vegetation growth
          - affects animal distribution
          - determines growing seasons
          - influences food preservation
          - shapes migration routes

      rainfall:
        influence:
          - determines freshwater availability
          - controls grassland productivity
          - influences wild cereal abundance
          - affects fruit production
          - regulates wetland formation

      seasonality:
        influence:
          - determines harvesting periods
          - influences migration timing
          - affects breeding seasons
          - creates food shortages
          - encourages storage technologies

      drought:
        influence:
          - reduces water sources
          - decreases plant productivity
          - concentrates wildlife
          - increases mobility
          - encourages dietary diversification

      flooding:
        influence:
          - renews fertile soils
          - expands fisheries
          - deposits nutrients
          - supports floodplain vegetation
          - creates temporary wetlands

      glaciation:
        influence:
          - reshapes landscapes
          - alters sea levels
          - redirects rivers
          - changes vegetation zones
          - creates migration corridors

    major_climatic_periods:

      pliocene:
        approximate_age:
          - "5.3–2.6 million years ago"
        significance:
          - cooling climate
          - expanding grasslands
          - hominin adaptation

      pleistocene:
        approximate_age:
          - "2.58 million–11,700 years ago"
        significance:
          - repeated ice ages
          - fluctuating rainfall
          - shifting ecosystems
          - large mammal diversity

      last_glacial_maximum:
        approximate_age:
          - "about 26,500–19,000 years ago"
        significance:
          - lower sea levels
          - colder temperatures
          - expanded ice sheets
          - altered migration routes

      holocene:
        approximate_age:
          - "11,700 years ago–present"
        significance:
          - warmer climate
          - environmental stability
          - expanding forests
          - increased opportunities for cultivation

    environmental_responses:

      forests:
        dietary_changes:
          - increased fruits
          - nuts
          - mushrooms
          - forest mammals
          - birds

      grasslands:
        dietary_changes:
          - grazing animals
