    knowledge_processes:

      observation:
        description: >
          Communities monitored rainfall, temperature, water levels, plant
          growth, animal movement, flowering, fruiting, insect activity, and
          seasonal change.

      classification:
        description: >
          Foods were distinguished by edibility, toxicity, habitat, maturity,
          processing requirement, nutritional value, preservation potential,
          and cultural importance.

      experimentation:
        description: >
          Communities tested preparation methods, harvesting techniques,
          storage designs, cooking temperatures, preservation methods, and
          movement strategies.

      transmission:
        description: >
          Knowledge passed through participation, demonstration, storytelling,
          correction, ritual, seasonal travel, songs, place names, and oral
          mapping.

      cumulative_learning:
        description: >
          Each generation inherited previous ecological knowledge and added new
          observations formed under changing climatic and social conditions.

    food_acquisition_workflow:
      - sequence: 1
        action: observe environmental indicators
      - sequence: 2
        action: identify expected food resources
      - sequence: 3
        action: determine travel and labour requirements
      - sequence: 4
        action: reach the resource zone
      - sequence: 5
        action: assess maturity, abundance, and safety
      - sequence: 6
        action: harvest, gather, hunt, trap, or fish
      - sequence: 7
        action: transport collected resources
      - sequence: 8
        action: clean and sort
      - sequence: 9
        action: process or cook
      - sequence: 10
        action: consume, share, preserve, store, or exchange
      - sequence: 11
        action: record outcomes through collective memory
      - sequence: 12
        action: update future seasonal decisions

    decision_rules:

      - rule_id: AHF-013.00-RULE-001
        condition: >
          IF one resource becomes scarce because of season, climate, disease,
          or competition
        response: >
          shift labour toward alternative plants, animals, aquatic resources,
          exchange partners, or ecological zones.

      - rule_id: AHF-013.00-RULE-002
        condition: >
          IF a food resource is abundant but highly perishable
        response: >
          increase immediate consumption, sharing, drying, smoking,
          fermentation, rendering, or transport to nearby camps.

      - rule_id: AHF-013.00-RULE-003
        condition: >
          IF a resource is predictable and storable
        response: >
          organize larger harvesting groups and invest additional labour in
          processing and storage.

      - rule_id: AHF-013.00-RULE-004
        condition: >
          IF travel energy exceeds the expected nutritional return
        response: >
          reduce the journey, choose another resource zone, or wait for a more
          favourable season.

      - rule_id: AHF-013.00-RULE-005
        condition: >
          IF environmental indicators suggest approaching drought, flood,
          storm, cold, or seasonal closure
        response: >
          collect reserves early, alter movement timing, diversify food
          sources, or move to a refuge area.

    metrics_and_proxies:

      dietary_breadth:
        definition: >
          The number and diversity of food categories represented within a
          reconstructed diet.
        evidence:
          - plant remains
          - animal remains
          - shell middens
          - residues
          - stable isotopes

      seasonal_reliability:
        definition: >
          The regularity with which a food resource returns during an expected
          season.

      processing_cost:
        definition: >
          Labour, time, fuel, water, and equipment required to make a resource
          edible and safe.

      mobility_cost:
        definition: >
          Energy, time, risk, and carrying burden associated with reaching and
          transporting food from a resource zone.

      storage_duration:
        definition: >
          The period for which processed food can remain usable under available
          preservation conditions.

      loss_rate:
        definition: >
          The share of collected food lost through spoilage, pests, theft,
          transport, contamination, or failed processing.

      caloric_density:
        definition: >
          The energy available relative to the weight or volume of a food.

      labour_return:
        definition: >
          The edible nutritional return obtained relative to labour and time
          invested.

