        - pastoralism
        - early agriculture

      overlaps_with:
        - nomadic lifestyles
        - hunter-gatherer systems
        - wild cereal harvesting
        - riverine food systems

      contributes_to:
        - animal domestication
        - seasonal calendars
        - migration knowledge
        - pasture management
        - livestock development

    evidence_types:

      zooarchaeological:
        - butchered bones
        - kill sites
        - bone assemblages
        - cut marks

      archaeobotanical:
        - grass seeds
        - pollen
        - phytoliths
        - charred grains

      landscape:
        - ancient fire layers
        - grazing indicators
        - erosion records

      technological:
        - projectile points
        - hunting weapons
        - grinding stones
        - hide scrapers

    misconceptions:

      - misconception: Grasslands contained little plant food.
        correction: >
          Grasslands supported diverse edible grasses, legumes, roots,
          underground storage organs and seasonal fruits in addition to game.

      - misconception: Grassland societies depended only on hunting.
        correction: >
          Hunting was combined with plant gathering, fishing, insect use,
          seed harvesting and exchange.

      - misconception: Open landscapes required little environmental knowledge.
        correction: >
          Successful survival required detailed understanding of migration,
          rainfall, vegetation growth, fire behaviour and water availability.

    retrieval_tags:
