    markdown_heading: "### AHF-013.03 Continental Dietary Differences"
    companion_markdown: nv_st_2026.07.12_0006_f1_agri_hist_v001.md
    mapping_status: fully_mapped
    canonical_term: continental_dietary_differences

    definition: >
      Early human diets differed substantially among continents because each
      region possessed unique climates, geological histories, ecosystems,
      freshwater availability, coastlines, mountains, vegetation, animal
      communities and seasonal patterns. These environmental differences
      influenced which foods were available, how they were obtained, the
      technologies that developed and the pathways that eventually led toward
      agriculture.

    overview:
