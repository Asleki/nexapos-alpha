  - concept_id: AHF-013.08
    parent_section_id: AHF-013
    title: Forest Food Systems
    markdown_heading: "### AHF-013.08 Forest Food Systems"
    companion_markdown: nv_st_2026.07.12_0006_f1_agri_hist_v001.md
    mapping_status: fully_mapped
    canonical_term: forest_food_systems

    definition: >
      Forest food systems are human food-acquisition, processing, storage,
      exchange and knowledge systems organized around woodland, rainforest,
      riverine forest, montane forest and seasonal forest environments.
      These systems depended upon detailed understanding of tree species,
      understory plants, fungi, insects, animals, water sources, fruiting
      cycles, canopy structure, soil moisture, fire behaviour and seasonal
      variation.

    extended_definition: >
      Forest food systems were not based upon unlimited abundance. Many forest
      resources were dispersed, seasonal, difficult to identify, toxic without
      processing or located within environments where travel, visibility and
      preservation were challenging. Successful forest living therefore
      required precise ecological knowledge, flexible movement, specialised
      tools, cooperative labour and reliable knowledge transmission.

    scope:
      included_environments:
        - tropical rainforest
        - temperate forest
        - woodland
        - gallery forest
        - riverine forest
        - montane forest
        - mangrove forest
        - seasonal dry forest
        - cloud forest
        - boreal forest
      included_food_categories:
        - fruits
        - nuts
        - seeds
        - wild legumes
        - roots
        - tubers
        - edible leaves
        - shoots
        - flowers
        - fungi
        - honey
        - insects
        - birds
        - eggs
        - small mammals
        - large mammals
        - fish
        - freshwater shellfish
      excluded_interpretations:
        - forest environments as automatically abundant
        - forest communities as technologically simple
        - forest food systems as environmentally passive
        - one universal tropical forest diet
        - modern commercial forestry

