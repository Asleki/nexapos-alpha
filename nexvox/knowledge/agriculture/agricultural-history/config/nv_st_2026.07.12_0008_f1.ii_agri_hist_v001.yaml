  - concept_id: AHF-013.11
    parent_section_id: AHF-013
    title: Animal Foods
    markdown_heading: "### AHF-013.11 Animal Foods"
    companion_markdown: nv_st_2026.07.12_0006_f1_agri_hist_v001.md
    mapping_status: fully_mapped
    canonical_term: animal_foods

    definition: >
      Animal foods comprise all edible resources obtained from wild and,
      later, managed animals. Throughout most of human evolutionary history,
      animal foods supplied concentrated protein, fats, essential amino acids,
      vitamins, minerals and other nutrients that complemented plant-based
      diets. Their acquisition required ecological knowledge, specialized
      technologies, cooperation and seasonal planning.

    extended_definition: >
      Animal foods included mammals, birds, reptiles, amphibians, fish,
      shellfish, insects, eggs and occasionally animal-derived products such
      as marrow, blood and honey. Availability differed between continents,
      ecosystems and seasons, requiring communities to understand migration
      routes, breeding cycles, habitats, predator behaviour, water sources
      and environmental change. These long-term observations later influenced
      animal domestication and pastoral agriculture.

    global_distribution:

      Africa:
