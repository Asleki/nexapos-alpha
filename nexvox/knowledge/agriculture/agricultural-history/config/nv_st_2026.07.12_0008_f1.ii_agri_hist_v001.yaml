      related:
        - AHF-005 Hunter-Gatherers
        - AHF-006 Sedentism
        - AHF-009 Early Food Systems
        - AHF-012 Nomadic Lifestyles
        - AHF-014 Wild Cereals

    uncertainty:
      level: low
      statement: >
        Hunter-gatherer food systems varied considerably across regions and
        time periods. Archaeological evidence preserves only part of the full
        dietary diversity, especially for highly perishable plant foods.

  - concept_id: AHF-013.03
