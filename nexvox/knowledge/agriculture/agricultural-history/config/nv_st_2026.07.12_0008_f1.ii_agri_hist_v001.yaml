    social_characteristics:
      - food sharing
      - reciprocal exchange
      - cooperative hunting
      - communal processing
      - seasonal gatherings
      - collective childcare
      - oral knowledge transmission

    representative_archaeological_cultures:

      Africa:
        - Capsian
