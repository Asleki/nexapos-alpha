      statement: >
        Forest food remains preserve unevenly because warm, humid environments
        accelerate decomposition. Archaeological reconstructions must therefore
        combine plant residues, animal remains, tools, charcoal, sediments,
        landscape evidence and carefully applied comparative knowledge.

  - concept_id: AHF-013.09
    parent_section_id: AHF-013
    title: Grassland Food Systems
    markdown_heading: "### AHF-013.09 Grassland Food Systems"
    companion_markdown: nv_st_2026.07.12_0006_f1_agri_hist_v001.md
    mapping_status: fully_mapped
    canonical_term: grassland_food_systems

    definition: >
      Grassland food systems are prehistoric subsistence systems organized
      around open grasslands, savannas, steppes, prairies and semi-arid
      grazing environments where human communities depended primarily upon
      grazing animals, seasonal plants, freshwater sources and mobility.
      These landscapes became some of humanity's most important environments
      for hunting, animal observation and eventually livestock domestication.

    extended_definition: >
      Unlike forests where food resources were vertically distributed among
      trees and dense vegetation, grasslands concentrated many resources in
      open landscapes. Large herbivores gathered in predictable locations,
      seasonal grasses matured together, visibility was greater, and movement
      across long distances became practical. Human survival therefore relied
      upon understanding migration, rainfall, water availability, fire,
      predator behaviour and seasonal ecological change.

    scope:
      included_environments:
        - savanna
        - temperate grassland
        - tropical grassland
        - prairie
        - steppe
        - pampas
        - veld
        - semi-arid grazing lands
        - open woodland
      primary_food_sources:
        - grazing mammals
        - birds
        - eggs
        - edible grasses
        - wild cereals
        - legumes
        - roots
        - bulbs
        - insects
        - freshwater fish
      excluded_topics:
        - modern ranching
        - industrial livestock production
        - mechanized agriculture

    continental_distribution:

      Africa:
        principal_regions:
          - Serengeti
          - Maasai Steppe
          - Sahel
          - Sudanian Savanna
          - Kalahari margins
          - East African Rift grasslands
        present_countries:
          - Kenya
          - Tanzania
          - Uganda
          - Ethiopia
          - South Sudan
          - Sudan
          - Botswana
          - Namibia
          - Zambia
          - Zimbabwe
          - South Africa
        dominant_resources:
