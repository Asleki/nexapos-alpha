        action: identify species and assess maturity or safety

      - sequence: 6
        action: collect, dig, hunt, trap, fish or climb

      - sequence: 7
        action: transport resources to a camp or processing location

      - sequence: 8
        action: sort edible material from toxic, damaged or immature material

      - sequence: 9
        action: process through roasting, grinding, leaching, drying or cooking

      - sequence: 10
        action: consume, share, preserve, store or exchange

      - sequence: 11
