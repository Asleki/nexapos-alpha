        - "frontend/src/modules/nexfarm/lifecycle/intake-workflow.js"
        - "frontend/src/modules/nexfarm/lifecycle/intake-transition.js"
        - "frontend/src/modules/nexfarm/nexfarm-service.js"
        - "frontend/src/main.js"
      test_vectors:
        - "Unregistered Seller -> GRAIN_INTAKE_STARTED -> ACCEPTED"
        - "Registered Supplier -> SUPPLIER_REGISTERED -> GRAIN_INTAKE_STARTED -> ACCEPTED"

    cycle_2_post_drying_custody:
