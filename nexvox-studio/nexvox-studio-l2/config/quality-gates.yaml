schema_version: "1.0"
quality_dimensions:
  - factual_accuracy
  - authority
  - provenance
  - completeness
  - consistency
  - clarity
  - privacy_safety
  - temporal_validity

scoring:
  minimum: 0
  maximum: 5

thresholds:
  governing:
    minimum_average: 4.0
    minimum_privacy_safety: 5
    minimum_provenance: 3
  authoritative:
    minimum_average: 3.8
    minimum_privacy_safety: 5
  historical:
    minimum_average: 3.5
    minimum_privacy_safety: 5
  narrative:
    minimum_average: 3.2
    minimum_privacy_safety: 5

hard_failures:
  - secret_detected
  - unapproved_personal_data
  - unknown_provenance
  - rejected_source
  - corrupted_file
  - unresolved_governing_conflict
