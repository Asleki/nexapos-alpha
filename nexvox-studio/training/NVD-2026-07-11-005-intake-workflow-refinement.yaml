  code_payload: |
    export function resolveIntakeWorkflowStatus(eventType) {
      const workflow = {
        SUPPLIER_REGISTERED: "registered",
        GRAIN_INTAKE_STARTED: "delivery_started",
        GRAIN_DELIVERY_STARTED: "delivery_started",
        GRAIN_TYPE_SELECTED: "inspected",
        GRAIN_VISUALLY_INSPECTED: "inspected",
        GRAIN_REJECTED: "rejected",
        MOISTURE_TEST_RECORDED: "moisture_tested",
        WEIGHT_CAPTURED: "weighed",
        PRICE_PREVIEW_CREATED: "price_previewed",
        SUPPLIER_ACCEPTED_OFFER: "offer_accepted",
        SUPPLIER_DECLINED_OFFER: "rejected",
        SOLAR_DRYING_ASSIGNED: "drying",
        INTERNAL_DRYING_ASSESSMENT_RECORDED: "drying_assessed",
        RETURN_TO_DRYING: "return_to_drying",
        LOSS_REVIEW_REQUIRED: "loss_review",
        INTERNAL_LOSS_REVIEW_REQUIRED: "loss_review",
        INTERNAL_GRAIN_LOSS_RECORDED: "grain_lost",
        PACKAGING_SUGGESTED: "packaging_ready",
        BAG_CREATED: "bagged",
        QR_ASSIGNED: "qr_ready",
        RACK_ASSIGNED: "stored",
        INTAKE_COMPLETED: "completed"
      };
      return workflow[eventType] ?? null;
    }
