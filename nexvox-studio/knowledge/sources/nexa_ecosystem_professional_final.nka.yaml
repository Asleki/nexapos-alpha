  purpose:
    primary: Preserve and retrieve the long-term engineering, operational, strategic and architectural memory of the Nexa
      ecosystem.
    future_use_cases:
    - Reconstruct a NexFarm estate layout when expanding to a new location.
    - Explain the original CEO or founder vision years after it was documented.
    - Compare historical plans with later architecture and operational reality.
    - Help NexVox Studio L2 answer grounded questions from the manual.
    - Support NexVox Studio L2 in writing future manuals, specifications, policies and training material.
    - Provide controlled rules and context to NexVox Simulation Agent L3.
    - Give NexVox Observer L1 stable terminology for operational analytics.
    - Train future employees, engineers, managers and partners.
    - Preserve institutional knowledge when human memory or personnel changes.
    non_goals:
    - Authorize live operational actions.
    - Replace newer approved policies or manuals.
    - Treat roadmap statements as already implemented.
    - Allow NexVox L2 or L3 to approve transactions, payments, staffing or configuration changes.
  authority_model:
    default_authority: architectural
    classes:
      normative: Mandatory rule, law, prohibition, invariant or approved control.
      architectural: Accepted design intent or structural model.
      operational: Describes business or estate operations.
      implementation_current: Represents the currently intended Alpha implementation.
      planned: Approved or proposed but not yet implemented.
      future_concept: Long-term possibility or exploratory direction.
      example: Illustrative scenario; not automatically binding.
      simulation_only: Applies exclusively to Simulation Runtime Mode.
      historical: Preserved to explain earlier thinking or evolution.
      deprecated: Retained for audit but no longer current.
      unverified: Requires human confirmation before operational reliance.
    precedence_rules:
    - A newer approved asset supersedes an older asset only when an explicit supersedes relationship exists.
    - Normative rules outrank descriptive examples.
    - Current implementation statements outrank planned and future statements for present-state questions.
    - Simulation-only statements must never be interpreted as production behavior.
    - Historical vision remains retrievable even when later strategy changes.
  temporal_knowledge:
    valid_from: '2026-07-15'
    valid_until: null
    supersedes: []
    superseded_by: []
    historical_preservation: true
    time_aware_answering:
      enabled: true
      requirements:
      - State the relevant date or version when answering historical questions.
      - Distinguish what was envisioned, approved and implemented.
      - Retrieve earlier assets for questions about past intent.
      - Prefer the latest approved asset for current-state questions.
  nexvox_usage:
    primary_consumer: nexvox_studio_l2
    secondary_consumers:
    - nexvox_observer_l1
    - nexvox_simulation_agent_l3
    - authorized_human_users
    l1_observer:
      permitted:
      - Use terminology and architecture context to interpret operational data.
      - Generate explanations, KPIs, alerts and recommendations.
      prohibited:
      - Approve or execute transactions.
      - Modify inventory, prices, employee records or configuration.
    l2_studio:
      permitted:
      - semantic_search
      - grounded_question_answering
      - knowledge_graph_generation
      - concept_linking
      - summarization
      - curriculum_generation
      - engineering_explanation
      - document_drafting
      - revision_note_generation
      - knowledge_distillation
      - historical_vision_retrieval
      - cross_document_comparison
      document_writing_controls:
      - Cite source assets and versions used.
      - Separate copied facts from model inference.
      - Preserve current, planned, future, historical and simulation labels.
      - Do not silently invent architecture, policy or CEO intent.
      - Mark unresolved conflicts and request human review.
      - Generate drafts only unless an authorized human approves publication.
      prohibited:
      - Operate NexaPOS.
      - Approve workflows.
      - Execute transactions.
      - Grant itself operational authority.
    l3_simulation_agent:
      permitted:
      - Use documented rules to generate synthetic scenarios.
      - Test workflows, capacity, synchronization, failures and expansion plans.
      required_runtime_mode: simulation
      prohibited:
      - Access production systems.
      - Impersonate real employees.
      - Send payments.
      - Approve workflows.
      - Alter production data.
      - Convert synthetic events into live events.
  ingestion:
    pipeline: nexvox_studio_l2_rag
    extractor:
      preferred_method: native_pdf_text_extraction
      fallback_method: layout_aware_pdf_parser
      ocr:
        enabled: false
        use_only_when: a page or figure has no extractable text and contains essential information
    structure_detection:
      recognize:
      - part
      - chapter
      - section
      - subsection
      - NT standard
      - NEES specification
      - business module
      - appendix
      - table
      - callout
      - workflow
      - formula
      - code block
      - diagram caption
      - glossary entry
      - technology profile
      heading_hierarchy_required: true
      preserve_page_boundaries: true
      preserve_table_headers: true
      preserve_workflow_order: true
    chunking:
      strategy: heading_aware_semantic
      default:
        target_tokens: 900
        minimum_tokens: 350
        maximum_tokens: 1200
        overlap_tokens: 125
      boundary_rules:
      - Never cross Part boundaries.
      - Prefer not to cross Chapter boundaries.
      - Do not combine unrelated business modules.
      - Do not combine production and simulation content unless explicitly comparing them.
      - Do not split normative rules from exceptions or prohibitions.
      - Keep short definitions as independent precision chunks.
      special_chunk_types:
        definition:
          target_tokens: 180
          include:
          - term
          - definition
          - scope
          - aliases
          - related_concepts
        engineering_rule:
          target_tokens: 300
          authority_class: normative
          require_exact_citation: true
        workflow:
          target_tokens: 600
          preserve_step_order: true
          include_roles_and_events: true
        table:
          keep_intact_when_tokens_below: 1400
          split_by:
          - row_group
          - module
          - lifecycle_phase
          - status_category
          repeat_headers_in_every_chunk: true
        diagram:
          create_textual_companion: true
          include:
          - caption
          - page
          - entities
          - relationships
          - flow_direction
          - textual_interpretation
