  citation_policy:
    required: true
    preferred_format: '{title}, v{document_version}, {part}, {section_id}, pp. {page_start}-{page_end}'
    minimum_fields:
    - document_id
    - document_version
    - page_start
    - page_end
    - heading_path
    rules:
    - Cite normative rules precisely.
    - Distinguish source statements from inference.
    - Say when the asset is silent or ambiguous.
    - Do not infer deployment status from roadmap language.
    - Preserve prohibitions and exceptions.
    - Use historical citations for historical-vision questions.
  security:
