      - API keys
      - service-role keys
      - private encryption keys
      - session tokens
      - personal identity numbers
      - unmasked phone numbers
      - private employee records
      redaction_required: true
  quality_control:
    pre_ingestion_checks:
    - Verify SHA-256 checksum.
    - Verify PDF page count.
    - Confirm searchable text exists.
    - Confirm headings and page numbers are extractable.
    - Detect duplicate paragraphs.
    - Detect malformed tables.
    - Detect missing section identifiers.
    - Detect unlabelled future or simulation claims.
    post_chunking_checks:
    - No empty chunks.
    - No chunk spans unrelated chapters.
    - Table headers preserved.
    - Workflow order preserved.
    - Page references attached.
    - Duplicate chunks suppressed.
    - Current, future, historical and simulation content separated.
    - Every chunk has a source-text hash.
    human_review_required_for:
    - CEO or founder vision interpretation
    - policy publication
    - architecture changes
    - legal or regulatory claims
    - financial rules
    - security rules
    - live operational instructions
  versioning:
    manifest_version: 1.0.0
    document_version: '1.0'
    reindex_on:
    - source_checksum_change
    - document_version_change
    - manifest_schema_change
    - taxonomy_change
    - authority_change
    update_workflow:
    - Calculate new PDF checksum.
    - Compare with stored checksum.
    - Identify changed sections.
    - Invalidate affected chunks and embeddings.
    - Preserve superseded chunks for audit.
    - Reindex changed content.
    - Run quality-control validation.
    - Require human approval before activating the new index.
