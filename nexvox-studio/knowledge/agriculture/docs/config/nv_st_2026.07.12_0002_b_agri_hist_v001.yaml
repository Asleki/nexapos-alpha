knowledge_articles:
- id: B-ART-001
  title: From observation to management
  summary: Repeated seasonal observation enabled people to predict where resources would appear, which
    conditions favoured them, and how disturbance could improve access. Management began before full cultivation
    through selective harvesting, protection, transplanting, pruning, burning, corralling, and water manipulation.
  domain: agriculture
  series: agricultural_history
  document_id: NVST-0002-B
  status: active
  retrieval_tags:
  - agricultural_history
  - early_agrarian_transition
  - knowledge_articles
  relationships: []
  source_status: foundation_synthesis
  uncertainty: context_dependent
  companion_markdown: nv_st_2026.07.12_0002_b_agri_hist_v001.md
- id: B-ART-002
  title: Why delayed returns changed society
  summary: Cultivation required labour before harvest. This delay increased the importance of planning,
    trust, property expectations, storage, conflict resolution, and protection of future benefits.
  domain: agriculture
  series: agricultural_history
  document_id: NVST-0002-B
  status: active
  retrieval_tags:
  - agricultural_history
  - early_agrarian_transition
  - knowledge_articles
  relationships: []
  source_status: foundation_synthesis
  uncertainty: context_dependent
  companion_markdown: nv_st_2026.07.12_0002_b_agri_hist_v001.md
- id: B-ART-003
  title: Why storage changed time
  summary: Storage linked one season to another. It allowed communities to plan beyond immediate consumption,
    support vulnerable members, conduct exchange, survive seasonal gaps, and invest in longer-term activities.
  domain: agriculture
  series: agricultural_history
  document_id: NVST-0002-B
  status: active
  retrieval_tags:
  - agricultural_history
  - early_agrarian_transition
  - knowledge_articles
  relationships: []
  source_status: foundation_synthesis
  uncertainty: context_dependent
  companion_markdown: nv_st_2026.07.12_0002_b_agri_hist_v001.md
- id: B-ART-004
  title: The labour paradox
  summary: Food production could support more people while requiring more repetitive and seasonally concentrated
    labour. Increased output did not automatically mean reduced work.
  domain: agriculture
  series: agricultural_history
  document_id: NVST-0002-B
  status: active
  retrieval_tags:
  - agricultural_history
  - early_agrarian_transition
  - knowledge_articles
  relationships: []
  source_status: foundation_synthesis
  uncertainty: context_dependent
  companion_markdown: nv_st_2026.07.12_0002_b_agri_hist_v001.md
- id: B-ART-005
  title: The mobility-sedentism continuum
  summary: Communities could maintain permanent structures while still moving seasonally. Sedentism was
    not always complete, immediate, or irreversible.
  domain: agriculture
  series: agricultural_history
  document_id: NVST-0002-B
  status: active
  retrieval_tags:
  - agricultural_history
  - early_agrarian_transition
  - knowledge_articles
  relationships: []
  source_status: foundation_synthesis
  uncertainty: context_dependent
  companion_markdown: nv_st_2026.07.12_0002_b_agri_hist_v001.md
- id: B-ART-006
  title: The social meaning of fields
  summary: Fields represented labour already invested. As investment increased, claims over access, inheritance,
    exclusion, and compensation became more important.
  domain: agriculture
  series: agricultural_history
  document_id: NVST-0002-B
  status: active
  retrieval_tags:
  - agricultural_history
  - early_agrarian_transition
  - knowledge_articles
  relationships: []
  source_status: foundation_synthesis
  uncertainty: context_dependent
  companion_markdown: nv_st_2026.07.12_0002_b_agri_hist_v001.md
- id: B-ART-007
  title: The ecology of selection
  summary: Human preference altered which organisms survived and reproduced. At the same time, selected
    organisms changed human diets, labour, settlement, and future choices.
  domain: agriculture
  series: agricultural_history
  document_id: NVST-0002-B
  status: active
  retrieval_tags:
  - agricultural_history
  - early_agrarian_transition
  - knowledge_articles
  relationships: []
  source_status: foundation_synthesis
  uncertainty: context_dependent
  companion_markdown: nv_st_2026.07.12_0002_b_agri_hist_v001.md
- id: B-ART-008
  title: The danger of narrow dependence
  summary: Production could create reliable bulk food while reducing ecological and dietary diversity.
    Systems therefore balanced control against concentration risk.
  domain: agriculture
  series: agricultural_history
  document_id: NVST-0002-B
  status: active
  retrieval_tags:
  - agricultural_history
  - early_agrarian_transition
  - knowledge_articles
  relationships: []
  source_status: foundation_synthesis
  uncertainty: context_dependent
  companion_markdown: nv_st_2026.07.12_0002_b_agri_hist_v001.md
- id: B-ART-009
  title: Agrarian lock-in
  summary: Once population, fields, storage, property, and institutions depended on production, returning
    to earlier mobility could become difficult even when farming produced new costs.
  domain: agriculture
  series: agricultural_history
  document_id: NVST-0002-B
  status: active
  retrieval_tags:
  - agricultural_history
  - early_agrarian_transition
  - knowledge_articles
  relationships: []
  source_status: foundation_synthesis
  uncertainty: context_dependent
  companion_markdown: nv_st_2026.07.12_0002_b_agri_hist_v001.md
- id: B-ART-010
  title: Multiple transitions, not one
  summary: Different communities entered cultivation through different combinations of plant management,
    animal management, storage, fishing intensity, exchange, water control, and settlement.
  domain: agriculture
  series: agricultural_history
  document_id: NVST-0002-B
  status: active
  retrieval_tags:
  - agricultural_history
  - early_agrarian_transition
  - knowledge_articles
  relationships: []
  source_status: foundation_synthesis
  uncertainty: context_dependent
  companion_markdown: nv_st_2026.07.12_0002_b_agri_hist_v001.md
- id: B-ART-011
  title: Surplus and authority
  summary: Stored surplus could be shared for resilience, exchanged for value, used in ritual, or controlled
    by emerging authorities. The social effect depended on ownership and access rules.
  domain: agriculture
  series: agricultural_history
  document_id: NVST-0002-B
  status: active
  retrieval_tags:
  - agricultural_history
  - early_agrarian_transition
  - knowledge_articles
  relationships: []
  source_status: foundation_synthesis
  uncertainty: context_dependent
  companion_markdown: nv_st_2026.07.12_0002_b_agri_hist_v001.md
- id: B-ART-012
  title: Knowledge as infrastructure
  summary: Seasonal calendars, soil knowledge, seed selection, tool skills, food processing, and storage
    knowledge were as important as physical structures.
  domain: agriculture
  series: agricultural_history
  document_id: NVST-0002-B
  status: active
