workflows:
- id: WF-001
  name: season_planning
  steps:
  - sequence: 1
    action: Define objectives
  - sequence: 2
    action: Review historical performance
  - sequence: 3
    action: Assess land, water, labour, finance, and market constraints
  - sequence: 4
    action: Select enterprises
  - sequence: 5
    action: Build budgets
  - sequence: 6
    action: Create calendar
  - sequence: 7
    action: Approve plan
  - sequence: 8
    action: Monitor and revise
  status: active
- id: WF-002
  name: land_preparation
  steps:
  - sequence: 1
    action: Inspect field
  - sequence: 2
    action: Assess soil moisture and compaction
  - sequence: 3
    action: Select method
  - sequence: 4
    action: Allocate machinery and labour
  - sequence: 5
    action: Perform operation
  - sequence: 6
