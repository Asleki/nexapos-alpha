examples:
- id: EX-001
  title: Smallholder maize
  description: A two-hectare farm coordinates seed, fertilizer, labour, rainfall, harvest timing, drying, bagging, and sale.
    A late planting decision affects yield, cash flow, and storage timing.
- id: EX-002
  title: Mixed crop-livestock farm
  description: Crop residues feed animals, manure returns nutrients to fields, and enterprise diversity reduces dependence
    on one income source.
- id: EX-003
  title: Irrigated vegetable enterprise
  description: Production depends on water reliability, pump capacity, crop scheduling, labour, cold chain, and rapid market
    access.
- id: EX-004
  title: Grain aggregation centre
  description: Many small deliveries are weighed, tested, graded, identified, combined under controlled rules, stored, and
    dispatched.
- id: EX-005
  title: Poultry unit
  description: Feed conversion, mortality, temperature, biosecurity, stocking density, and market timing determine performance.
- id: EX-006
  title: Warehouse bottleneck
  description: Receiving capacity exceeds drying capacity, causing queues and moisture risk even though total storage space
    is available.
- id: EX-007
  title: Price shock
  description: A farm with one buyer and one crop suffers more than a diversified farm with storage and multiple market channels.
- id: EX-008
  title: Data failure
  description: Missing batch identity prevents traceability and makes quality complaints difficult to investigate.
relationships:
- source: agriculture
  target: soil_and_crop
  description: Soil physical, chemical, and biological condition affects rooting, nutrient supply, water availability, and
    crop performance.
- source: agriculture
  target: water_and_energy
  description: Irrigation capacity depends on water source, energy, pumping, distribution, and maintenance.
- source: agriculture
  target: yield_and_market
  description: Higher yield does not guarantee profit if price, quality, logistics, or demand are weak.
- source: agriculture
  target: quality_and_storage
  description: Storage preserves quality only when incoming product, moisture, hygiene, structure, and monitoring are controlled.
- source: agriculture
  target: labour_and_timing
  description: Insufficient labour can delay time-sensitive operations and reduce output.
- source: agriculture
  target: finance_and_inputs
  description: Cash-flow timing determines whether inputs and labour are available when biologically needed.
- source: agriculture
  target: data_and_decisions
  description: Poor records weaken forecasting, traceability, accountability, and learning.
- source: agriculture
  target: infrastructure_and_market_access
  description: Roads, storage, communications, and transport affect losses, price, and buyer reach.
- source: agriculture
  target: climate_and_risk
  description: Climate changes production windows, water demand, pest pressure, and expected variability.
- source: agriculture
  target: policy_and_incentives
  description: Rules, taxes, subsidies, standards, and permits influence enterprise choice and competitiveness.
