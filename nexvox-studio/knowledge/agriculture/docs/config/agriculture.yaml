decision_rules:
- id: RULE-001
  name: planting_readiness
  logic: IF soil moisture is adequate AND seed quality is approved AND forecast risk is acceptable THEN planting may proceed
    ELSE delay or revise plan.
  status: active
- id: RULE-002
  name: irrigation_trigger
  logic: IF measured or estimated soil water falls below the crop threshold AND water is available THEN irrigate within system
    limits.
  status: active
- id: RULE-003
  name: pest_control
  logic: IF monitored pest pressure exceeds the economic threshold THEN apply the least disruptive effective control allowed
    by policy.
  status: active
- id: RULE-004
  name: harvest_timing
  logic: IF maturity criteria are met AND weather and handling capacity are suitable THEN harvest.
  status: active
- id: RULE-005
  name: drying_required
  logic: IF measured moisture exceeds the approved storage threshold THEN drying is required before long-term storage.
  status: active
- id: RULE-006
  name: storage_acceptance
  logic: IF quality, moisture, packaging, identity, and capacity requirements are met THEN accept into storage ELSE divert,
    rework, quarantine, or reject.
  status: active
- id: RULE-007
  name: sale_approval
  logic: IF inventory is available AND quality is verified AND price and payment terms are acceptable THEN approve sale.
  status: active
- id: RULE-008
  name: equipment_use
  logic: IF equipment is serviceable AND operator is trained AND safety controls are present THEN operation may begin.
  status: active
- id: RULE-009
  name: biosecurity_response
  logic: IF a suspected contagious disease is observed THEN isolate affected stock and escalate before movement.
  status: active
- id: RULE-010
  name: capacity_expansion
  logic: IF sustained utilization exceeds the approved threshold AND service level or safety is deteriorating THEN evaluate
    expansion or process redesign.
  status: active
risks:
- id: RISK-001
  category: weather
  description: Drought, excessive rainfall, frost, heat, wind, storms, or unpredictable seasons.
  default_status: open
- id: RISK-002
  category: biological
  description: Pests, diseases, weeds, invasive species, and contamination.
  default_status: open
- id: RISK-003
  category: soil
  description: Erosion, compaction, acidity, salinity, nutrient imbalance, and organic matter decline.
  default_status: open
- id: RISK-004
  category: water
  description: Scarcity, contamination, poor distribution, waterlogging, and conflict over access.
  default_status: open
- id: RISK-005
  category: input
  description: Counterfeit, expired, unsuitable, delayed, or unaffordable inputs.
  default_status: open
- id: RISK-006
  category: market
  description: Price collapse, weak demand, buyer default, market closure, and quality rejection.
  default_status: open
- id: RISK-007
  category: financial
  description: Cash-flow shortage, debt stress, interest changes, fraud, and uninsured loss.
  default_status: open
- id: RISK-008
  category: operational
  description: Late work, poor supervision, weak records, inadequate labour, and process failure.
  default_status: open
- id: RISK-009
  category: equipment
  description: Breakdown, unsafe use, poor maintenance, fuel shortage, and unavailable spare parts.
  default_status: open
- id: RISK-010
  category: storage
  description: Moisture migration, insects, rodents, mould, theft, fire, and poor stock rotation.
  default_status: open
- id: RISK-011
  category: logistics
  description: Road failure, vehicle shortage, delay, product damage, and fuel cost.
  default_status: open
- id: RISK-012
  category: regulatory
  description: Non-compliance, permit failure, prohibited inputs, and changing legal requirements.
  default_status: open
- id: RISK-013
  category: reputational
  description: Unsafe product, unfair dealing, delayed payment, and misleading claims.
  default_status: open
- id: RISK-014
  category: data
  description: Missing records, incorrect measurements, duplication, loss, unauthorized access, and incompatible formats.
  default_status: open
- id: RISK-015
  category: human
  description: Injury, illness, labour conflict, skill gaps, and fatigue.
  default_status: open
