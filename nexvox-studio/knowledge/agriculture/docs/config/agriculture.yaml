schema:
  name: nexvox_studio_l2_domain_foundation
  version: 1.0.0
  encoding: utf-8
document:
  document_id: NVST-AGR-ROOT-0000
  title: Agriculture Domain Foundation
  domain: agriculture
  document_type: root_domain_foundation
  status: living
  classification: internal
  version: 0.2.0
  created: '2026-07-12'
  repository_path_markdown: nexapos-alpha/nexvox-studio/knowledge/agriculture/docs/content/agriculture.md
  repository_path_yaml: nexapos-alpha/nexvox-studio/knowledge/agriculture/docs/config/agriculture.yaml
  pair_key: agriculture
  synchronization_required: true
purpose:
  primary: Provide the shared Agriculture language, ontology, rules, workflows, metrics, risks, and expansion map used by
    NexVox Studio L2.
  uses:
  - retrieval
  - knowledge graph construction
  - query routing
  - cross-domain reasoning
  - specialist document inheritance
  - future evaluation
  not_final_authority_for:
  - current law
  - current prices
  - local recommendations
  - commodity-specific procedures
  - approved NexFarm SOPs
assumptions:
- Agriculture operates under finite resources.
- Biological systems contain uncertainty.
- Measurements require units, method, time, and context.
- Local evidence can override generic guidance.
- Production and simulation data remain separate.
definitions:
- id: DEF-001
  term: Agriculture
  definition: The organized production, management, transformation, movement, exchange, and stewardship of biological resources
    for food, feed, fibre, fuel, raw materials, livelihoods, and ecosystem services.
  status: active
- id: DEF-002
  term: Agricultural system
  definition: A connected set of biological, physical, economic, social, technological, and institutional components used
    to produce agricultural outcomes.
  status: active
- id: DEF-003
  term: Farm
  definition: A managed production unit where land, water, labour, capital, knowledge, and biological resources are combined.
  status: active
- id: DEF-004
  term: Agribusiness
  definition: The commercial system surrounding agricultural inputs, production, processing, logistics, finance, marketing,
    and services.
  status: active
- id: DEF-005
  term: Crop
  definition: A plant intentionally grown for food, feed, fibre, fuel, medicine, seed, ornament, industrial use, or ecological
    function.
  status: active
- id: DEF-006
  term: Livestock
  definition: Domesticated animals managed for food, income, labour, breeding, fibre, manure, security, or other productive
    purposes.
  status: active
- id: DEF-007
  term: Aquaculture
  definition: The managed production of fish, shellfish, aquatic plants, or other aquatic organisms.
  status: active
- id: DEF-008
  term: Agroforestry
  definition: The deliberate integration of trees with crops, livestock, or both.
  status: active
- id: DEF-009
  term: Soil
  definition: A dynamic natural body composed of minerals, organic matter, water, air, and living organisms that supports
    plant growth and ecological processes.
  status: active
- id: DEF-010
  term: Soil fertility
  definition: The capacity of soil to supply nutrients in forms and quantities that support plant growth.
  status: active
- id: DEF-011
  term: Soil health
  definition: The continued ability of soil to function as a living ecosystem that supports plants, animals, water regulation,
    and nutrient cycling.
  status: active
- id: DEF-012
  term: Yield
  definition: The quantity of useful output produced per unit area, animal, plant, time, or production cycle.
  status: active
- id: DEF-013
  term: Productivity
  definition: The amount of output obtained relative to the resources used.
  status: active
- id: DEF-014
  term: Efficiency
  definition: The degree to which inputs are converted into useful outputs with minimal waste.
  status: active
- id: DEF-015
  term: Resilience
  definition: The ability of a system to absorb disturbance, adapt, and continue functioning.
  status: active
- id: DEF-016
  term: Sustainability
  definition: The ability to maintain environmental, economic, and social performance over time without undermining future
    capacity.
  status: active
- id: DEF-017
  term: Food security
  definition: A condition in which people have reliable access to sufficient, safe, nutritious, and acceptable food.
  status: active
- id: DEF-018
  term: Value chain
  definition: The connected sequence of activities that moves a product from inputs and production to processing, distribution,
    sale, use, and waste recovery.
  status: active
- id: DEF-019
  term: Supply chain
  definition: The network that moves materials, products, information, and money between suppliers, producers, processors,
    distributors, and customers.
  status: active
- id: DEF-020
  term: Post-harvest management
  definition: All handling, transformation, protection, storage, and movement after harvest or collection and before final
    use.
  status: active
- id: DEF-021
  term: Traceability
  definition: The ability to follow the identity, origin, movement, transformation, and status of a product, batch, or asset.
  status: active
- id: DEF-022
  term: Batch
  definition: A defined quantity grouped for handling, storage, processing, sale, testing, or traceability.
  status: active
- id: DEF-023
  term: Lot
  definition: A defined group of products sharing relevant origin, quality, timing, or handling characteristics.
  status: active
- id: DEF-024
  term: Input
  definition: A resource consumed or used in production, such as seed, feed, fertilizer, labour, water, fuel, machinery, or
    information.
  status: active
- id: DEF-025
  term: Output
  definition: A useful result of an agricultural process, including products, by-products, services, data, or ecosystem benefits.
  status: active
- id: DEF-026
  term: By-product
  definition: A secondary output generated alongside the main product.
  status: active
- id: DEF-027
  term: Waste
  definition: Material, energy, time, capacity, or value that is discarded, lost, degraded, or left unused.
  status: active
- id: DEF-028
  term: Loss
  definition: A reduction in quantity, quality, nutritional value, safety, economic value, or operational usefulness.
  status: active
- id: DEF-029
  term: Risk
  definition: The possibility that an uncertain event or condition will cause harm or reduce expected performance.
  status: active
- id: DEF-030
  term: Hazard
  definition: A source or condition capable of causing harm.
  status: active
- id: DEF-031
  term: Constraint
  definition: A condition that limits feasible choices, capacity, performance, or timing.
  status: active
- id: DEF-032
  term: Capacity
  definition: The maximum sustainable amount of work, production, storage, processing, or movement possible under defined
    conditions.
  status: active
- id: DEF-033
  term: Throughput
  definition: The quantity processed through a system per unit time.
  status: active
- id: DEF-034
  term: Utilization
  definition: The proportion of available capacity that is actually used.
  status: active
- id: DEF-035
  term: Bottleneck
  definition: The resource or process step that limits overall system throughput.
  status: active
- id: DEF-036
  term: Inventory
  definition: Inputs, work in progress, harvested products, livestock, packaging, spare parts, or finished goods held for
    future use or sale.
  status: active
- id: DEF-037
  term: Stock rotation
  definition: The rule used to determine the order in which inventory is issued, sold, processed, or consumed.
  status: active
- id: DEF-038
  term: Procurement
  definition: The organized acquisition of produce, inputs, equipment, materials, or services.
  status: active
- id: DEF-039
  term: Aggregation
  definition: The combination of smaller quantities from multiple sources into larger commercial volumes.
  status: active
- id: DEF-040
  term: Grading
  definition: The classification of products according to defined quality characteristics.
  status: active
- id: DEF-041
  term: Sorting
  definition: The separation of products by size, quality, defect, variety, maturity, contamination, or intended use.
  status: active
- id: DEF-042
  term: Inspection
  definition: The systematic examination of products, animals, facilities, records, or processes.
  status: active
- id: DEF-043
  term: Quality assurance
  definition: A planned system designed to prevent defects and maintain standards.
  status: active
- id: DEF-044
  term: Quality control
  definition: Measurement, testing, and inspection used to verify whether requirements are met.
  status: active
- id: DEF-045
  term: Moisture content
  definition: The proportion of water contained in a material, expressed using a defined basis.
  status: active
- id: DEF-046
  term: Drying
  definition: The controlled reduction of moisture to improve stability, safety, or processing suitability.
  status: active
- id: DEF-047
  term: Irrigation
  definition: The controlled application of water to soil or crops.
  status: active
- id: DEF-048
  term: Drainage
  definition: The removal or control of excess water from land, soil, or facilities.
  status: active
- id: DEF-049
  term: Evapotranspiration
  definition: The combined loss of water through evaporation and plant transpiration.
  status: active
- id: DEF-050
  term: Agro-ecological zone
  definition: An area with broadly similar climate, soils, elevation, growing period, and production potential.
  status: active
- id: DEF-051
  term: Microclimate
  definition: Localized climatic conditions within a small area such as a field, greenhouse, canopy, or storage structure.
  status: active
- id: DEF-052
  term: Crop rotation
  definition: The planned sequence of different crops over time on the same land.
  status: active
- id: DEF-053
  term: Intercropping
  definition: The cultivation of two or more crops together in the same field during the same period.
  status: active
- id: DEF-054
  term: Mixed farming
  definition: The integration of crop and livestock enterprises within one farming system.
  status: active
- id: DEF-055
  term: Integrated pest management
  definition: A coordinated strategy using monitoring, prevention, biological, cultural, mechanical, and chemical controls.
  status: active
- id: DEF-056
  term: Biosecurity
  definition: Practices that prevent the introduction and spread of pests or diseases.
  status: active
- id: DEF-057
  term: Mechanization
  definition: The use of tools, machines, equipment, and power systems to improve agricultural operations.
  status: active
- id: DEF-058
  term: Precision agriculture
  definition: The use of location-specific data, sensing, and control to manage variation within fields or production systems.
  status: active
- id: DEF-059
  term: Digital agriculture
  definition: The use of digital tools, data, connectivity, analytics, and automation in agricultural decision-making and
    operations.
  status: active
- id: DEF-060
  term: Extension
  definition: The delivery of practical, technical, business, and regulatory knowledge to farmers and agricultural enterprises.
  status: active
- id: DEF-061
  term: Cooperative
  definition: A member-owned organization formed to achieve shared economic or service objectives.
  status: active
- id: DEF-062
  term: Farm-gate price
  definition: The price received by a producer at or near the point where produce leaves the farm.
  status: active
- id: DEF-063
  term: Gross margin
  definition: Enterprise revenue minus variable costs.
  status: active
- id: DEF-064
  term: Break-even point
  definition: The output, price, or sales level at which total revenue equals total cost.
  status: active
- id: DEF-065
  term: Working capital
  definition: Funds used to support short-term operating needs.
  status: active
- id: DEF-066
  term: Capital expenditure
  definition: Spending used to acquire or improve long-term assets.
  status: active
- id: DEF-067
  term: Food system
  definition: The connected network of production, processing, distribution, consumption, governance, and waste management.
  status: active
- id: DEF-068
  term: One Health
  definition: An approach recognizing the interdependence of human, animal, and environmental health.
  status: active
principles:
- id: PRI-001
  name: Biological reality first
  description: Agricultural plans must respect living systems, growth cycles, animal welfare, ecology, and physical limits.
  status: active
- id: PRI-002
  name: Context matters
  description: A practice that works in one climate, soil, market, or scale may fail in another.
  status: active
- id: PRI-003
  name: Measure before deciding
  description: Decisions should use observations, records, tests, and explicit assumptions.
  status: active
- id: PRI-004
  name: Protect the production base
  description: Soil, water, biodiversity, labour capacity, and infrastructure must not be consumed faster than they can recover.
  status: active
- id: PRI-005
  name: Quality cannot be inspected in at the end
  description: Quality must be built through inputs, process control, hygiene, timing, and traceability.
  status: active
- id: PRI-006
  name: Loss prevention is a production activity
  description: Avoided loss creates value just as additional production does.
  status: active
- id: PRI-007
  name: Safety overrides speed
  description: Unsafe work, contaminated food, and uncontrolled hazards are unacceptable even when they increase short-term
    output.
  status: active
- id: PRI-008
  name: Traceability supports accountability
  description: Products, inputs, actions, and decisions should be attributable to time, place, batch, and responsible actor.
  status: active
- id: PRI-009
  name: Constraints must be explicit
  description: Land, water, labour, storage, finance, time, and transport limits should be modeled before commitments are
    made.
  status: active
- id: PRI-010
  name: Local evidence outranks generic advice
  description: Specific, verified local information should take precedence over broad recommendations.
  status: active
- id: PRI-011
  name: Diversification reduces concentrated risk
  description: Multiple enterprises, markets, and practices can reduce dependence on one uncertain source.
  status: active
- id: PRI-012
  name: Feedback improves systems
  description: Actual results should update future plans, budgets, and operating rules.
  status: active
- id: PRI-013
  name: No recommendation without assumptions
  description: Advice should state the conditions under which it is expected to work.
  status: active
- id: PRI-014
  name: Production and market planning are connected
  description: Producing without considering demand, timing, quality, logistics, and price can destroy value.
  status: active
- id: PRI-015
  name: Waste should be treated as a resource question
  description: Residues and by-products should be evaluated for reuse, recovery, recycling, energy, or soil benefit.
  status: active
- id: PRI-016
  name: Long-term capacity matters
  description: Short-term gains should not undermine future production or financial viability.
  status: active
metrics:
- id: KPI-001
  code: yield_per_area
  name: Yield per area
  unit: kg/ha or t/ha
  definition: Harvested output divided by cultivated area.
  direction: context_dependent
- id: KPI-002
  code: yield_per_animal
  name: Yield per animal
  unit: kg, litres, eggs, or offspring per animal
  definition: Useful output per animal over a defined period.
  direction: context_dependent
- id: KPI-003
  code: survival_rate
  name: Survival rate
  unit: '%'
  definition: Animals or plants surviving divided by the initial population.
  direction: context_dependent
- id: KPI-004
  code: germination_rate
  name: Germination rate
  unit: '%'
  definition: Seeds germinated divided by seeds tested or planted.
  direction: context_dependent
- id: KPI-005
  code: plant_population
  name: Plant population
  unit: plants/ha
  definition: Number of established plants per unit area.
  direction: context_dependent
- id: KPI-006
  code: feed_conversion_ratio
  name: Feed conversion ratio
  unit: feed/output
  definition: Feed consumed divided by useful animal output.
  direction: context_dependent
- id: KPI-007
  code: water_use_efficiency
  name: Water-use efficiency
  unit: kg/m3
  definition: Useful output per unit of water consumed.
  direction: context_dependent
- id: KPI-008
  code: nutrient_use_efficiency
  name: Nutrient-use efficiency
  unit: kg output/kg nutrient
  definition: Useful output relative to nutrient input.
  direction: context_dependent
- id: KPI-009
  code: labour_productivity
  name: Labour productivity
  unit: output/labour-hour
  definition: Useful output divided by labour time.
  direction: context_dependent
- id: KPI-010
  code: machine_utilization
  name: Machine utilization
  unit: '%'
  definition: Actual productive machine time divided by available time.
  direction: context_dependent
- id: KPI-011
  code: capacity_utilization
  name: Capacity utilization
  unit: '%'
  definition: Actual throughput divided by rated sustainable capacity.
  direction: context_dependent
- id: KPI-012
  code: storage_loss_rate
  name: Storage loss rate
  unit: '%'
  definition: Quantity or value lost during storage divided by quantity received.
  direction: context_dependent
- id: KPI-013
  code: post_harvest_loss_rate
  name: Post-harvest loss rate
  unit: '%'
  definition: Loss after harvest divided by gross harvested quantity.
  direction: context_dependent
- id: KPI-014
  code: rejection_rate
  name: Rejection rate
  unit: '%'
  definition: Rejected quantity or lots divided by inspected quantity or lots.
  direction: context_dependent
- id: KPI-015
  code: downtime
  name: Downtime
  unit: hours
  definition: Time during which equipment or a process is unavailable.
  direction: context_dependent
- id: KPI-016
  code: on_time_completion
  name: On-time completion
  unit: '%'
  definition: Activities completed by deadline divided by planned activities.
  direction: context_dependent
- id: KPI-017
  code: gross_margin
  name: Gross margin
  unit: currency
  definition: Revenue minus variable costs.
  direction: context_dependent
- id: KPI-018
  code: gross_margin_per_area
  name: Gross margin per area
  unit: currency/ha
  definition: Gross margin divided by area.
  direction: context_dependent
- id: KPI-019
  code: break_even_yield
  name: Break-even yield
  unit: kg/ha
  definition: Yield needed to cover total cost at a defined price.
  direction: context_dependent
- id: KPI-020
  code: inventory_turnover
  name: Inventory turnover
  unit: turns/period
  definition: Cost or volume issued divided by average inventory.
  direction: context_dependent
- id: KPI-021
  code: order_fill_rate
  name: Order fill rate
  unit: '%'
  definition: Orders fulfilled completely divided by total orders.
  direction: context_dependent
- id: KPI-022
  code: traceability_completeness
  name: Traceability completeness
  unit: '%'
  definition: Records with complete required traceability fields divided by total records.
  direction: context_dependent
- id: KPI-023
  code: quality_compliance_rate
  name: Quality compliance rate
  unit: '%'
  definition: Lots meeting defined quality requirements divided by lots tested.
  direction: context_dependent
- id: KPI-024
  code: incident_rate
  name: Safety incident rate
  unit: incidents/worker-hours
  definition: Recorded incidents relative to labour exposure.
  direction: context_dependent
- id: KPI-025
  code: disease_incidence
  name: Disease incidence
  unit: '%'
  definition: Affected plants or animals divided by population at risk.
  direction: context_dependent
- id: KPI-026
  code: pest_pressure_index
  name: Pest pressure index
  unit: index
  definition: Composite measure of pest presence, severity, and spread.
  direction: context_dependent
- id: KPI-027
  code: soil_organic_matter
  name: Soil organic matter
  unit: '%'
  definition: Measured organic matter proportion in soil.
  direction: context_dependent
- id: KPI-028
  code: soil_ph
  name: Soil pH
  unit: pH
  definition: Measure of acidity or alkalinity.
  direction: context_dependent
- id: KPI-029
  code: moisture_content
  name: Moisture content
  unit: '%'
  definition: Water proportion in a material using a stated basis.
  direction: context_dependent
- id: KPI-030
  code: forecast_accuracy
  name: Forecast accuracy
  unit: '%'
  definition: Degree to which forecast values match actual outcomes.
  direction: context_dependent
- id: KPI-031
  code: price_variance
  name: Price variance
  unit: '%'
  definition: Difference between expected and actual price relative to expected price.
  direction: context_dependent
