evidence_taxonomy:

  - evidence_id: AHF-NOM-EVD-001
    name: Mobility Route Evidence
    description: >
      Paths, camps, water points, repeated occupation patterns, animal movement,
      transport traces, and landscape-use evidence used to reconstruct mobile
      livelihood systems.

  - evidence_id: AHF-NOM-EVD-002
    name: Pastoral Evidence
    description: >
      Herd age profiles, animal remains, dung deposits, corrals, pathology,
      genetic evidence, and settlement relationships used to reconstruct
      pastoral management.

  - evidence_id: AHF-NOM-EVD-003
    name: Oral Landscape Evidence
    description: >
      Place names, route narratives, genealogies, songs, customary rights,
      seasonal calendars, and remembered environmental events used to interpret
      mobile territorial systems.

  - evidence_id: AHF-NOM-EVD-004
    name: Portable Technology Evidence
    description: >
      Shelters, containers, tools, ropes, transport equipment, animal gear, and
      repair traces used to reconstruct mobile engineering systems.

  - evidence_id: AHF-NOM-EVD-005
    name: Water-Access Evidence
    description: >
      Wells, springs, watering places, camps, paths, sediment, animal remains,
      and territorial patterns used to study water-dependent movement.

  - evidence_id: AHF-NOM-EVD-006
    name: Manure and Dung Evidence
    description: >
      Dung deposits, nutrient concentrations, plant remains, insects, and soil
      change used to identify livestock presence and nutrient movement.

  - evidence_id: AHF-NOM-EVD-007
    name: Exchange-Network Evidence
    description: >
      Non-local materials, animal movement, tools, containers, market sites,
      linguistic evidence, and route patterns used to reconstruct exchange.

misconceptions:

  - misconception_id: AHF-NOM-MIS-001
    claim: Nomadic communities move without plans.
    correction: >
      Nomadic movement is commonly organized through routes, seasonal
      calendars, water knowledge, territorial agreements, and environmental
      observation.

  - misconception_id: AHF-NOM-MIS-002
    claim: Nomadic societies have no agriculture.
    correction: >
      Pastoral nomadism is an agricultural system, and mobile communities may
      also manage plants, animals, soils, fire, trade, and temporary cultivation.

  - misconception_id: AHF-NOM-MIS-003
    claim: Nomadic communities have no territory.
    correction: >
      Nomadic territories may consist of seasonal routes, water points,
      grazing zones, customary rights, sacred places, and negotiated access.

  - misconception_id: AHF-NOM-MIS-004
    claim: Mobility automatically means poverty.
    correction: >
      Mobility may be a deliberate strategy for using dispersed resources,
      managing risk, maintaining herds, and connecting markets.

  - misconception_id: AHF-NOM-MIS-005
    claim: Portable technology is inferior.
    correction: >
      Portable technologies are optimized for low weight, repairability,
      movement, adaptable use, and local material availability.

  - misconception_id: AHF-NOM-MIS-006
    claim: All nomadic communities are pastoralists.
    correction: >
      Nomadic livelihoods may include hunting, gathering, fishing, trade,
      craft services, transport, temporary cultivation, and pastoralism.

  - misconception_id: AHF-NOM-MIS-007
    claim: Nomadic systems always cause environmental degradation.
    correction: >
      Environmental outcomes depend on mobility freedom, herd size, governance,
      rainfall, water access, route availability, and resource concentration.

  - misconception_id: AHF-NOM-MIS-008
    claim: Sedentarization always improves livelihoods.
    correction: >
      Permanent settlement may improve access to services while also causing
      pasture concentration, route loss, unemployment, disease concentration,
      and cultural disruption.

