reasoning_rules:
  - id: AHF-NOM-RULE-001
    rule: >
      Nomadic movement must be interpreted as an organized livelihood strategy
      rather than random wandering.
  - id: AHF-NOM-RULE-002
    rule: >
      Mobility, semi-sedentism, and permanent settlement exist on a continuum
      and may coexist within one household or community.
  - id: AHF-NOM-RULE-003
    rule: >
      Pastoral nomadism is an agricultural system because it manages
      domesticated animals, productive landscapes, labour, and food outputs.
  - id: AHF-NOM-RULE-004
    rule: >
      Nomadic territories may be represented by routes, water points,
      seasonal grazing areas, customary rights, and social agreements rather
      than permanently fenced boundaries.
  - id: AHF-NOM-RULE-005
    rule: >
      Mobility may reduce some environmental risks while creating or
      intensifying other risks.
  - id: AHF-NOM-RULE-006
    rule: >
      Sedentarization must not automatically be interpreted as economic,
      ecological, social, or cultural improvement.
  - id: AHF-NOM-RULE-007
    rule: >
      Nomadic systems must be evaluated according to environmental fit,
      livelihood security, resource access, mobility freedom, knowledge
      continuity, and resilience.
  - id: AHF-NOM-RULE-008
    rule: >
      Mobile and settled communities must not be treated as historically
      isolated systems because they frequently exchanged goods, labour,
      knowledge, animals, nutrients, and social relationships.
  - id: AHF-NOM-RULE-009
    rule: >
      Political borders, land privatization, conflict, and water restrictions
      may transform environmental variability into livelihood crisis by
      reducing mobility options.
  - id: AHF-NOM-RULE-010
    rule: >
      Similar forms of mobility may have different causes, institutions,
      cultural meanings, and agricultural consequences.

