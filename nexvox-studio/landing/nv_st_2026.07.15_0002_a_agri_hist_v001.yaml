  training_design:
    difficulty: foundational_to_intermediate
    estimated_reading_minutes: 90
    estimated_study_minutes: 180
    target_audiences:
    - NexVox Studio L2
    - agriculture-history students
    - Nexa employees
    - future NexFarm trainees
    prerequisites:
    - NV-ST-TR-AGRI-HIST-0001-A
    - basic understanding of foraging
    - basic understanding of ecology
    learning_objectives:
    - Define and compare major mobility types.
    - Explain environmental and social drivers of seasonal movement.
    - Describe navigation and memory landscapes.
    - Identify archaeological evidence for mobility.
    - Explain stone fracture and core-flake technologies.
    - Distinguish major early tool traditions.
    - Describe organic and composite technologies.
    - Explain fire as technology.
    - Connect mobility and tools to later agriculture.
    - Recognize preservation bias and dating uncertainty.
  authority_and_epistemology:
    default_authority: educational_synthesis
    evidence_classes:
      direct_archaeological_evidence: Recovered tools, features, residues, and materials.
      indirect_scientific_evidence: Isotopes, wear, distribution, and seasonality indicators.
      ethnographic_analogy: Comparison with recent societies; useful but not proof.
      experimental_archaeology: Reconstruction used to test feasibility.
      inference: Reasoned interpretation.
      speculation: Possibility requiring explicit labeling.
    mandatory_reasoning_rules:
    - Do not describe mobility as aimless wandering.
    - Do not treat all hunter-gatherers as equally mobile.
    - Do not assume one universal seasonal round.
    - Do not treat stone tools as the whole toolkit.
    - Do not infer function from shape alone.
    - Do not present technological change as a single linear ladder.
    - Verify precise dates against current scholarly sources.
    - Identify preservation bias.
