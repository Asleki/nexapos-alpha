  scope:
    included:
    - early plant gathering
    - wild plant identification
    - seasonality
    - plant processing
    - storage
    - early animal hunting
    - scavenging
    - tracking
    - cooperative hunting
    - small game
    - large game
    - fishing
    - butchery
    - foraging and agriculture transition
    excluded:
    - full plant domestication history
    - full animal domestication history
    - regional agricultural origins in detail
    - Neolithic political systems
    - historical state agriculture
    - modern industrial agriculture
    temporal_scope:
      start: early hominin foraging
      end: pre-domestication transitions
      precision: broad and non-linear
  training_design:
    difficulty: foundational_to_intermediate
    target_audiences:
    - NexVox Studio L2
    - software-assisted learners
    - agriculture-history students
    - Nexa employees
    - future NexFarm trainees
    estimated_reading_minutes: 75
    estimated_study_minutes: 150
    prerequisites:
    - basic understanding of human evolution
    - basic understanding of ecology
    - basic distinction between wild and domesticated species
    learning_objectives:
    - Define foraging, gathering, hunting and scavenging.
    - Explain the skill involved in early plant gathering.
    - Identify major categories of gathered plant foods.
    - Explain the role of seasonality and mobility.
    - Describe tools used in gathering and hunting.
    - Distinguish opportunistic capture, scavenging and active hunting.
    - Explain hunting risks, returns and cooperation.
    - Identify archaeological evidence for plant and animal use.
    - Recognize preservation bias.
    - Connect foraging knowledge to later cultivation and domestication.
  authority_and_epistemology:
    default_authority: educational_synthesis
    evidence_classes:
      direct_archaeological_evidence: Physical remains directly recovered from archaeological contexts.
      indirect_scientific_evidence: Residues, isotopes, wear, or spatial patterns requiring interpretation.
      ethnographic_analogy: Comparison with recent or living societies; useful but not proof.
      experimental_archaeology: Reconstruction used to test feasibility or expected traces.
      inference: Reasoned interpretation from evidence.
      speculation: Possibility that must remain explicitly labelled.
    mandatory_reasoning_rules:
    - Do not claim one universal prehistoric diet.
    - Do not equate lack of plant preservation with lack of plant use.
    - Do not impose rigid universal gender roles.
    - Do not present agriculture as a sudden invention.
    - Do not treat one region as representative of all humanity.
    - Do not convert analogy into proof.
