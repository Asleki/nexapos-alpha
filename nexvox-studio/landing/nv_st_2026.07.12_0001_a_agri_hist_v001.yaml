training:
  level: NexVox Studio L2
  retrieval_enabled: true
  embedding_enabled: true
  knowledge_graph_enabled: true
  fine_tuning_enabled: false
  chunking:
    primary_unit: section
    preserve_heading_context: true
    recommended_tokens: 700
    max_tokens: 1200
    overlap_tokens: 120
  reasoning_rules:
  - do not assume one universal path of agricultural development
  - distinguish sequence from causation
  - state uncertainty
  - compare multiple evidence types
  - avoid treating later systems as automatically superior
quality:
