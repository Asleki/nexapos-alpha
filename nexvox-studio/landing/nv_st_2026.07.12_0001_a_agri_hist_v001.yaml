workflows:
- id: AH-WF-001
  name: Seasonal planning
  steps:
  - sequence: 1
    action: Observe seasonal indicators
  - sequence: 2
    action: Estimate labour and food needs
  - sequence: 3
    action: Select land and activities
  - sequence: 4
    action: Coordinate household and communal work
  - sequence: 5
    action: Retain seed or breeding stock
  - sequence: 6
    action: Prepare tools and storage
- id: AH-WF-002
  name: Cultivation cycle
  steps:
  - sequence: 1
    action: Clear or prepare land
  - sequence: 2
    action: Sow or transplant
  - sequence: 3
    action: Protect and maintain
  - sequence: 4
    action: Manage water where possible
  - sequence: 5
    action: Harvest
  - sequence: 6
    action: Process
  - sequence: 7
    action: Store or exchange
- id: AH-WF-003
  name: Storage cycle
  steps:
  - sequence: 1
    action: Prepare facility
  - sequence: 2
    action: Dry or condition product
  - sequence: 3
    action: Clean and sort
  - sequence: 4
    action: Load and secure
  - sequence: 5
    action: Inspect periodically
  - sequence: 6
    action: Control pests
  - sequence: 7
    action: Withdraw by need or obligation
- id: AH-WF-004
  name: Exchange cycle
  steps:
  - sequence: 1
    action: Assess surplus
  - sequence: 2
    action: Select market or partner
  - sequence: 3
    action: Transport goods
  - sequence: 4
    action: Measure quantity
  - sequence: 5
    action: Negotiate value
  - sequence: 6
    action: Settle obligations
  - sequence: 7
    action: Return with goods, credit, or claims
- id: AH-WF-005
  name: Tax and redistribution
  steps:
  - sequence: 1
    action: Assess household or land obligation
  - sequence: 2
    action: Measure expected contribution
  - sequence: 3
    action: Collect product or labour
  - sequence: 4
    action: Record or acknowledge receipt
  - sequence: 5
    action: Store or redistribute
  - sequence: 6
    action: Enforce shortfall rules
decision_rules:
- id: AH-RULE-001
  name: Sowing timing
  logic: IF seasonal indicators and soil moisture appear favourable AND seed is available THEN sow; ELSE delay, reduce area,
    or shift activity.
- id: AH-RULE-002
  name: Land expansion
  logic: IF household labour and tools exceed current land demand AND new land is accessible THEN expand; ELSE intensify or
    maintain area.
- id: AH-RULE-003
  name: Storage allocation
  logic: IF expected shortage risk is high THEN retain more surplus in storage; ELSE exchange a larger share.
- id: AH-RULE-004
  name: Market participation
  logic: IF transport cost and risk are lower than expected exchange gain THEN enter market; ELSE consume, store, or exchange
    locally.
- id: AH-RULE-005
  name: Mobility decision
  logic: IF pasture or gathered resources decline below household needs THEN move people, animals, or activity to another
    zone.
- id: AH-RULE-006
  name: Risk spreading
  logic: IF one activity is highly exposed to weather or conflict THEN diversify timing, location, foods, or exchange partners.
- id: AH-RULE-007
  name: Labour coordination
  logic: IF peak labour exceeds household capacity THEN mobilize reciprocal labour, dependent labour, hired labour, or communal
    work.
risks:
- id: AH-RISK-001
  name: Climate variability
  description: Shifts in rainfall, temperature, storms, drought, flood, and season length could reduce output or destroy stored
    food.
- id: AH-RISK-002
  name: Conflict
  description: War, raiding, displacement, and political instability could interrupt production and seize land, labour, animals,
    or stores.
- id: AH-RISK-003
  name: Disease
  description: Human, animal, and plant disease could reduce labour, survival, reproduction, and food supply.
- id: AH-RISK-004
  name: Storage failure
  description: Moisture, insects, rodents, fire, theft, and structural collapse could destroy seasonal reserves.
- id: AH-RISK-005
  name: Institutional extraction
  description: Excessive taxation, rent, tribute, or labour obligations could reduce household resilience.
- id: AH-RISK-006
  name: Market dependency
  description: Dependence on distant buyers or essential imports could expose producers to price and transport disruption.
- id: AH-RISK-007
  name: Knowledge loss
  description: Displacement, death of specialists, language loss, or institutional collapse could erase accumulated techniques.
- id: AH-RISK-008
  name: Soil decline
  description: Repeated use without recovery could reduce fertility, structure, and long-term output.
- id: AH-RISK-009
  name: Water failure
  description: Loss of water access or infrastructure could sharply reduce production.
- id: AH-RISK-010
  name: Measurement abuse
  description: Unfair units or manipulated standards could transfer value away from producers.
failure_modes:
- id: AH-FM-001
  name: Overexpansion
  description: Land or herd expansion exceeds labour, water, soil, storage, or transport capacity.
- id: AH-FM-002
  name: Single-source dependence
  description: A society relies too heavily on one food, one season, one water source, or one route.
- id: AH-FM-003
  name: Storage concentration
  description: Centralized stores increase efficiency but create a single point of political, military, or environmental failure.
- id: AH-FM-004
  name: Rigid institutions
  description: Rules fail to adapt to changing climate, population, labour, or markets.
- id: AH-FM-005
  name: Unsustainable extraction
  description: Tax, rent, or tribute removes the reserves needed for seed, recovery, and household survival.
- id: AH-FM-006
  name: Technology mismatch
  description: A tool or practice is adopted without the skills, maintenance, materials, or environment required.
- id: AH-FM-007
  name: Ecological overshoot
  description: Cultivation, grazing, or clearing exceeds the recovery capacity of land and water.
- id: AH-FM-008
  name: Broken knowledge transmission
  description: Skills are not passed to the next generation or are displaced by externally imposed systems.
