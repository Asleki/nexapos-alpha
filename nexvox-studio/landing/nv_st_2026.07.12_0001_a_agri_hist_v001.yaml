purpose:
- teach recurring patterns in agricultural history
- support periodization and historical reasoning
- define historical entities, metrics, workflows, risks, and frameworks
- serve as root context for later specialized history files
definitions:
- id: AH-DEF-001
  term: Agricultural history
  definition: The study of how human societies organized food production, land use, labour, exchange, technology, storage,
    governance, and ecological management across time.
- id: AH-DEF-002
  term: Agrarian system
  definition: A historically specific arrangement of land, labour, tools, knowledge, rights, obligations, production, and
    exchange.
- id: AH-DEF-003
  term: Subsistence
  definition: The production and acquisition of food and essential materials primarily to support the producing household
    or community.
- id: AH-DEF-004
  term: Surplus
  definition: Output remaining after immediate consumption, seed retention, feed needs, losses, and required obligations have
    been met.
- id: AH-DEF-005
  term: Intensification
  definition: An increase in output or labour input per unit of land, time, water, or other resource.
- id: AH-DEF-006
  term: Extensification
  definition: An increase in production mainly by expanding the area or number of resources under use.
- id: AH-DEF-007
  term: Domestication
  definition: A long-term process in which human selection and management alter the traits, reproduction, behaviour, or distribution
    of living organisms.
- id: AH-DEF-008
  term: Sedentism
  definition: A pattern of living in one place for longer periods rather than moving continuously.
- id: AH-DEF-009
  term: Land tenure
  definition: The rules and institutions governing access to, use of, control over, transfer of, and inheritance of land.
- id: AH-DEF-010
  term: Agrarian transition
  definition: A major change in how land, labour, technology, ownership, markets, and production are organized.
- id: AH-DEF-011
  term: Food system
  definition: The connected historical arrangement of production, storage, movement, processing, exchange, consumption, governance,
    and waste.
- id: AH-DEF-012
  term: Historical productivity
  definition: The relationship between output and the land, labour, animals, water, capital, energy, or time used in a given
    era.
explanations:
- id: AH-EXP-001
  title: How agriculture began
  explanation: Agriculture did not appear as a single invention. It emerged gradually through repeated observation, selective
    gathering, landscape management, controlled burning, protection of useful species, seasonal scheduling, and experimentation
    with reproduction.
- id: AH-EXP-002
  title: Why agriculture spread
  explanation: Agriculture spread because it could support larger and more predictable food supplies under some conditions,
    but the process was uneven and often combined migration, exchange, imitation, coercion, adaptation, and local innovation.
- id: AH-EXP-003
  title: Why systems changed
  explanation: Agricultural systems changed when population, climate, tools, institutions, trade, taxation, war, labour relations,
    and knowledge altered the balance between existing practices and available alternatives.
- id: AH-EXP-004
  title: Why agriculture became political
  explanation: Control of land, water, storage, transport, and surplus created opportunities for authority, taxation, redistribution,
    social hierarchy, and conflict.
- id: AH-EXP-005
  title: Why storage mattered
  explanation: Storage converted seasonal production into year-round food security, supported larger settlements, enabled
    trade, and created new risks involving spoilage, theft, control, and inequality.
- id: AH-EXP-006
  title: Why labour organization changed
  explanation: As operations became larger or more specialized, households, communal groups, dependent labour, hired labour,
    bonded labour, and institutional labour were organized differently to meet seasonal peaks.
historical_context:
- id: AH-CTX-001
  title: Environmental background
  context: Long-term shifts in temperature, rainfall, vegetation, water availability, and animal distribution changed the
    reliability of gathered and hunted resources.
- id: AH-CTX-002
  title: Social background
  context: Population growth, kinship structures, conflict, exchange, mobility, and ritual shaped how food was produced and
    distributed.
- id: AH-CTX-003
  title: Economic background
  context: The emergence of surplus and exchange increased the importance of measurement, storage, transport, contracts, debt,
    and market institutions.
- id: AH-CTX-004
  title: Technological background
  context: Changes in cutting, digging, grinding, water control, animal power, transport, metallurgy, energy, and information
    systems altered what was technically possible.
- id: AH-CTX-005
  title: Institutional background
  context: Rules governing land, labour, inheritance, taxation, storage, and trade influenced who could produce, who controlled
    surplus, and who bore risk.
principles:
- id: AH-PRI-001
  name: Historical systems are context-bound
  description: No agricultural system can be understood outside its climate, ecology, social order, technology, and institutions.
- id: AH-PRI-002
  name: Change is rarely linear
  description: Agricultural development includes adoption, rejection, hybridization, decline, recovery, and repeated reinvention.
- id: AH-PRI-003
  name: Productivity is multidimensional
  description: Historical success may refer to yield, labour saving, resilience, storage, taxation, social stability, or market
    access.
- id: AH-PRI-004
  name: Surplus creates power
  description: Control over stored food, land, labour, and transport often increased political and social authority.
- id: AH-PRI-005
  name: Knowledge is cumulative and fragile
  description: Techniques can accumulate over generations, but can also disappear through displacement, conflict, ecological
    change, or institutional collapse.
- id: AH-PRI-006
  name: Innovation has trade-offs
  description: New tools and systems may increase output while also increasing dependence, inequality, ecological pressure,
    or vulnerability.
- id: AH-PRI-007
  name: Local adaptation matters
  description: Imported practices are reshaped by local soils, water, labour, culture, and risk.
- id: AH-PRI-008
  name: Evidence is incomplete
  description: Agricultural history must often reconstruct systems from partial physical, written, oral, ecological, and economic
    evidence.
metrics:
- id: AH-KPI-001
  code: output_per_area
  name: Output per area
  definition: Measures harvested output relative to cultivated land.
- id: AH-KPI-002
  code: output_per_worker
  name: Output per worker
  definition: Measures labour productivity within a historical system.
- id: AH-KPI-003
  code: seed_return_ratio
  name: Seed return ratio
  definition: Compares harvested output with seed retained for planting.
- id: AH-KPI-004
  code: surplus_ratio
  name: Surplus ratio
  definition: Measures output remaining after local consumption, seed, feed, and unavoidable losses.
- id: AH-KPI-005
  code: loss_rate
  name: Loss rate
  definition: Estimates the share lost during harvesting, transport, storage, processing, taxation, or conflict.
- id: AH-KPI-006
  code: storage_duration
  name: Storage duration
  definition: Indicates how long food remained usable under contemporary methods.
- id: AH-KPI-007
  code: transport_radius
  name: Transport radius
  definition: Represents the practical distance over which goods could be moved economically.
- id: AH-KPI-008
  code: land_use_intensity
  name: Land-use intensity
  definition: Describes frequency and intensity of cultivation relative to fallow or recovery.
- id: AH-KPI-009
  code: labour_peak_ratio
  name: Labour peak ratio
  definition: Compares peak seasonal labour demand with average labour availability.
- id: AH-KPI-010
  code: market_share
  name: Marketed share
  definition: Estimates the portion of output entering exchange rather than direct use.
- id: AH-KPI-011
  code: tax_extraction_rate
  name: Tax extraction rate
  definition: Estimates the share transferred to rulers, institutions, landlords, or other authorities.
- id: AH-KPI-012
  code: risk_exposure_index
  name: Risk exposure index
  definition: Combines dependence on climate, a narrow food base, weak storage, conflict, and market volatility.
