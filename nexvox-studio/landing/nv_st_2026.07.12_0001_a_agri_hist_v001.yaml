  placeholder_content_forbidden: true
  companion_sync_required: true
  named_country_excluded: true
  named_crop_excluded: true
  reserved_slot_padding_forbidden: true
  minimum_information_density_required: true
  user_review_required_before_finalization: true
source_governance:
  allowed_sources:
  - user_supplied_markdown
  - user_supplied_yaml
  - approved_project_documents
  - approved_field_notes
  - approved_operational_records
  - official_publications
  - peer_reviewed_research
  - recognized_reference_works
  - approved_expert_input
  disallowed_sources:
  - invented_placeholder_content
  - unsourced_claims
  - fabricated_statistics
  - unverified_current_rules
  - generic_filler_written_only_to_increase_line_count
  provenance_required: true
  source_date_required_when_time_sensitive: true
  jurisdiction_required_when_location_specific: true
  confidence_required_when_uncertain: true
expansion_policy:
  method: append_verified_knowledge_only
  future_content_origin:
  - material provided directly by the user
  - approved existing Nexa documents
  - verified external research when explicitly requested
  - approved corrections and additions
  - new domain records created from reviewed source material
  markdown_yaml_sync:
    required: true
    rule: Every substantive Markdown addition must create or update the corresponding YAML concept, entity, relationship,
      metric, rule, source, or section record.
    no_empty_slots: true
    no_preallocated_fake_sections: true
    section_ids_added_only_when_content_exists: true
  review_rule: New content remains provisional until reviewed and accepted by the user.
  versioning_rule: Increment the version only when an accepted revision is saved.
content_alignment:
  markdown_is_primary_narrative: true
  yaml_is_primary_structure: true
  must_match_on:
  - document identity
  - version
  - section titles
  - section order
  - defined terms
  - entities
  - metrics
  - decision rules
  - risks
  - relationships
  - sources
  - uncertainty
  mismatch_handling: Flag the mismatch and do not ingest until reconciled.
