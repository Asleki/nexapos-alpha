periodization:
- id: AH-PER-001
  name: Pre-agricultural food systems
  description: Predominantly gathering, hunting, fishing, mobility, and ecosystem knowledge before systematic cultivation
    and herding.
  dates_required: false
- id: AH-PER-002
  name: Early cultivation and management
  description: Increasing intervention in plant growth, animal movement, water access, and landscape composition.
  dates_required: false
- id: AH-PER-003
  name: Settled agrarian communities
  description: Longer-term settlement, storage, communal labour, fixed fields, and stronger territorial claims.
  dates_required: false
- id: AH-PER-004
  name: Early state agriculture
  description: Taxation, irrigation administration, recordkeeping, granaries, and organized labour under political institutions.
  dates_required: false
- id: AH-PER-005
  name: Classical agrarian systems
  description: Expanded land management, estates, tenancy, trade, animal power, and written agricultural knowledge.
  dates_required: false
- id: AH-PER-006
  name: Medieval and regional agrarian orders
  description: Highly varied combinations of communal rights, estates, customary obligations, markets, and local technology.
  dates_required: false
- id: AH-PER-007
  name: Early commercial transformation
  description: Growing market orientation, land consolidation, specialized regions, finance, and long-distance trade.
  dates_required: false
- id: AH-PER-008
  name: Industrial transformation
  description: Mechanization, fossil energy, chemical inputs, transport networks, and factory-linked processing.
  dates_required: false
- id: AH-PER-009
  name: Scientific intensification
  description: Formal research, improved breeding, standardized inputs, extension, and measurement-based management.
  dates_required: false
- id: AH-PER-010
  name: Digital and automated agriculture
  description: Sensors, software, remote observation, analytics, automation, and data-driven coordination.
  dates_required: false
evidence_types:
- id: AH-EVD-001
  name: Archaeological remains
  description: Structures, tools, storage facilities, field systems, animal remains, plant remains, and settlement patterns.
- id: AH-EVD-002
  name: Paleoenvironmental evidence
  description: Sediments, pollen, charcoal, soils, and other indicators of past environments.
- id: AH-EVD-003
  name: Written records
  description: Accounts, contracts, tax lists, legal codes, manuals, estate records, and administrative documents.
- id: AH-EVD-004
  name: Oral traditions
  description: Narratives, practices, songs, genealogies, and customary knowledge transmitted across generations.
- id: AH-EVD-005
  name: Material culture
  description: Tools, containers, transport devices, architecture, and processing equipment.
- id: AH-EVD-006
  name: Bioarchaeological evidence
  description: Human and animal remains indicating diet, labour, disease, mobility, and stress.
- id: AH-EVD-007
  name: Landscape evidence
  description: Terraces, canals, boundaries, roads, abandoned fields, and long-term land modification.
- id: AH-EVD-008
  name: Linguistic evidence
  description: Vocabulary, loanwords, classifications, and naming systems that reveal knowledge transmission.
historiography:
- id: AH-HIS-001
  approach: Progress narrative
  description: Interprets history as movement from simple to advanced systems, but risks undervaluing resilience and local
    adaptation.
- id: AH-HIS-002
  approach: Materialist interpretation
  description: Emphasizes land, labour, surplus, technology, class, and political economy.
- id: AH-HIS-003
  approach: Environmental interpretation
  description: Focuses on climate, ecology, water, disease, and resource limits.
- id: AH-HIS-004
  approach: Institutional interpretation
  description: Explains change through property, governance, taxation, law, markets, and organizations.
- id: AH-HIS-005
  approach: Cultural interpretation
  description: Examines belief, ritual, identity, gender, status, and meaning.
- id: AH-HIS-006
  approach: Technological interpretation
  description: Highlights tools, energy, infrastructure, measurement, and information.
- id: AH-HIS-007
  approach: World-systems interpretation
  description: Studies how regions become connected through trade, extraction, dependency, and unequal exchange.
- id: AH-HIS-008
  approach: Local and indigenous interpretation
  description: Centers local knowledge, adaptation, continuity, and non-linear development.
