    target_audiences:
    - NexVox Studio L2
    - agriculture-history learners
    - future NexFarm trainees
    learning_objectives:
    - Distinguish fire use, fire control, maintenance, and ignition.
    - Explain hearth and fuel systems.
    - Describe major food-preparation techniques.
    - Explain effects of heat on proteins, starches, microbes, and toxins.
    - Evaluate archaeological evidence for ancient fire.
    - Assess the cooking hypothesis critically.
    - Connect fire and processing to storage, mobility, settlement, and agriculture.
  epistemology:
    evidence_classes:
    - direct_archaeological_evidence
    - strong_inference
    - moderate_inference
    - weak_inference
    - hypothesis
    - speculation
    mandatory_rules:
    - Do not equate burned material with intentional cooking.
    - Do not equate fire use with fire production.
    - Do not assign one global date to the beginning of cooking.
    - Present the cooking hypothesis as debated.
    - Do not claim cooking improves every nutrient.
    - Do not claim heat removes every toxin.
    - Verify precise dates against current peer-reviewed literature.
